<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, minimal-ui">
  <title>BedDecor · Camera</title>
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#0f1625">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BedDecor">
  <meta name="format-detection" content="telephone=no">
  <meta name="mobile-web-app-capable" content="yes">
  
  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js')
          .then(function(registration) {
            console.log('Service Worker registered successfully');
          })
          .catch(function(err) {
            console.log('Service Worker registration failed:', err);
          });
      });
    }
  </script>
  
  <style>
    /* === RESET === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    /* === HTML/BODY === */
    html, body {
      background: #080b12;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px;
      font-family: -apple-system, 'SF Pro Display', 'Segoe UI', Roboto, system-ui, sans-serif;
      touch-action: manipulation;
      overflow: hidden;
      position: fixed;
      width: 100%;
      -webkit-touch-callout: none;
      user-select: none;
    }
    
    /* === APP CONTAINER === */
    .app {
      max-width: 420px;
      width: 100%;
      background: #0f1625;
      border-radius: 40px 40px 28px 28px;
      padding: 12px 12px 18px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
      max-height: 100vh;
      max-height: -webkit-fill-available;
      -webkit-overflow-scrolling: touch;
    }
    .app::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 20% 10%, rgba(255,107,129,0.06) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 90%, rgba(100,140,255,0.04) 0%, transparent 50%);
      pointer-events: none;
    }
    
    /* === VERSION BADGE === */
    .version-badge {
      position: absolute;
      bottom: 4px;
      right: 12px;
      font-size: 0.5rem;
      color: #2a3a5a;
      opacity: 0.4;
      z-index: 0;
      pointer-events: none;
    }
    
    /* === TOP BAR === */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2px 10px 2px;
      position: relative;
      z-index: 2;
    }
    .top-bar .left-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .top-bar .camera-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.6rem;
      font-weight: 600;
      color: #6a7ea8;
      background: #1a2338;
      padding: 3px 10px 3px 8px;
      border-radius: 20px;
      border: 1px solid #2d3d60;
    }
    .top-bar .camera-status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }
    .top-bar .camera-status .dot.on { background: #4ade80; }
    .top-bar .camera-status .dot.off { background: #f87171; }
    .top-bar .camera-status .dot.checking { background: #facc15; }
    .top-bar .right-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    /* === PERMISSION BUTTON === */
    .perm-btn-sm {
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 0.55rem;
      font-weight: 600;
      color: #93b4f8;
      cursor: pointer;
      transition: all 0.2s ease;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      -webkit-touch-callout: none;
      user-select: none;
    }
    .perm-btn-sm:active { transform: scale(0.95); }
    .perm-btn-sm.granted {
      background: rgba(74,222,128,0.15);
      border-color: rgba(74,222,128,0.3);
      color: #4ade80;
    }
    .perm-btn-sm.denied {
      background: rgba(248,113,113,0.15);
      border-color: rgba(248,113,113,0.3);
      color: #f87171;
      animation: pulse-red-sm 2s infinite;
    }
    .perm-btn-sm.checking { opacity: 0.5; cursor: not-allowed; }
    @keyframes pulse-red-sm {
      0%, 100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.2); }
      50% { box-shadow: 0 0 0 6px rgba(248,113,113,0); }
    }
    .perm-btn-sm .icon { font-size: 0.8rem; }
    
    /* === SETTINGS BUTTON === */
    .settings-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid #2d3d60;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: #6a7ea8;
      cursor: pointer;
      transition: all 0.2s ease;
      touch-action: manipulation;
      position: relative;
      -webkit-touch-callout: none;
      user-select: none;
    }
    .settings-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.1); }
    .settings-btn.active { border-color: #ff5e7c; color: #ff8aa3; }
    .settings-btn .badge-dot {
      position: absolute;
      top: -2px;
      right: -2px;
      width: 8px;
      height: 8px;
      background: #ff5e7c;
      border-radius: 50%;
      border: 2px solid #0f1625;
      display: none;
    }
    .settings-btn .badge-dot.show { display: block; }
    
    /* === INSTALL BUTTON === */
    .install-btn {
      background: rgba(74,222,128,0.12);
      border: 1px solid rgba(74,222,128,0.25);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 0.55rem;
      font-weight: 600;
      color: #4ade80;
      cursor: pointer;
      transition: all 0.2s ease;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      -webkit-touch-callout: none;
      user-select: none;
    }
    .install-btn:active { transform: scale(0.95); }
    .install-btn.hidden { display: none; }
    
    /* === TICKET BOX === */
    .ticket-section {
      position: relative;
      z-index: 1;
      margin-bottom: 10px;
    }
    .ticket-box {
      background: #141d31;
      border-radius: 20px;
      padding: 8px 12px 10px;
      border: 1px solid #26334f;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
    }
    .ticket-box .label-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2px;
    }
    .ticket-box .label-row .tag {
      font-size: 0.55rem;
      font-weight: 600;
      color: #8a9fc9;
      background: #1f2a44;
      padding: 1px 10px;
      border-radius: 30px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border: 1px solid #2f4065;
    }
    .ticket-box .label-row .hint {
      font-size: 0.5rem;
      color: #5f739b;
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .ticket-box .label-row .hint .clear-btn {
      background: none;
      border: none;
      color: #5f739b;
      cursor: pointer;
      font-size: 0.7rem;
      padding: 0 4px;
    }
    .ticket-box .label-row .hint .clear-btn:active { color: #f87171; }
    .ticket-box input {
      width: 100%;
      background: #0a111f;
      border: none;
      border-radius: 16px;
      padding: 8px 14px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #eef4ff;
      outline: none;
      transition: 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }
    .ticket-box input::placeholder { color: #3d517a; font-weight: 400; }
    .ticket-box input:focus { box-shadow: 0 0 0 2px rgba(255,94,124,0.2); }
    
    /* === SUGGESTIONS === */
    .suggestions-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      padding: 0 2px;
    }
    .suggestions-header .label {
      font-size: 0.55rem;
      color: #5f739b;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .suggestions-header .add-btn {
      background: none;
      border: 1px dashed #2d3d60;
      border-radius: 16px;
      padding: 2px 10px;
      font-size: 0.55rem;
      color: #6a7ea8;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
      -webkit-touch-callout: none;
      user-select: none;
    }
    .suggestions-header .add-btn:active {
      background: rgba(255,94,124,0.1);
      border-color: #ff5e7c;
    }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
      padding: 0 2px;
      min-height: 28px;
    }
    .suggestion-chip {
      background: #1a2338;
      border: 1px solid #2d3d60;
      border-radius: 30px;
      padding: 4px 12px;
      font-size: 0.65rem;
      font-weight: 500;
      color: #8a9fc9;
      cursor: pointer;
      transition: all 0.15s ease;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      -webkit-touch-callout: none;
      user-select: none;
    }
    .suggestion-chip:active { transform: scale(0.95); }
    .suggestion-chip.selected {
      background: rgba(255,94,124,0.2);
      border-color: #ff5e7c;
      color: #ff8aa3;
    }
    .suggestion-chip .chip-text { max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
    .empty-suggestions {
      color: #4a5f89;
      font-size: 0.6rem;
      padding: 4px 0;
      width: 100%;
      text-align: center;
      opacity: 0.6;
    }
    
    /* === CAMERA PREVIEW === */
    .camera-container {
      position: relative;
      z-index: 1;
      margin-bottom: 10px;
    }
    .camera-preview {
      background: #080e1a;
      border-radius: 20px;
      min-height: 380px;
      min-height: 50vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      border: 2px solid #1a2642;
      transition: all 0.3s ease;
    }
    .camera-preview.has-image { border-color: #2d4068; }
    .camera-preview img {
      width: 100%;
      height: auto;
      max-height: 500px;
      object-fit: contain;
      display: block;
    }
    .camera-preview .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 30px 20px;
      color: #4a5f89;
      text-align: center;
    }
    .camera-preview .placeholder .big-icon { font-size: 4rem; opacity: 0.3; }
    .camera-preview .placeholder .main-text { font-size: 0.95rem; font-weight: 500; color: #6a80ad; }
    .camera-preview .placeholder .sub-text { font-size: 0.7rem; color: #3d517a; }
    
    /* === LIVE VIDEO === */
    .camera-preview video {
      width: 100%;
      height: 100%;
      min-height: 380px;
      min-height: 50vh;
      object-fit: cover;
      border-radius: 18px;
      display: block;
      background: #080e1a;
      -webkit-transform: rotate(0deg);
      transform: rotate(0deg);
    }
    
    /* === CAMERA CONTROLS === */
    .camera-controls {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      justify-content: center;
      align-items: center;
    }
    .btn-capture {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      border: 3.5px solid #ff5e7c;
      background: rgba(255,94,124,0.12);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(255,94,124,0.15);
      touch-action: manipulation;
      flex-shrink: 0;
      -webkit-touch-callout: none;
      user-select: none;
    }
    .btn-capture:active {
      transform: scale(0.92);
      background: rgba(255,94,124,0.25);
    }
    .btn-capture:disabled {
      opacity: 0.4;
      transform: scale(0.95);
      cursor: not-allowed;
    }
    .btn-capture .inner-circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #ff5e7c;
      transition: all 0.2s ease;
    }
    .btn-capture:active .inner-circle { transform: scale(0.85); }
    .btn-capture.has-photos {
      border-color: #4ade80;
      box-shadow: 0 0 30px rgba(74,222,128,0.15);
    }
    .btn-capture.has-photos .inner-circle { background: #4ade80; }
    
    /* === ACTION BUTTONS === */
    .btn-action {
      padding: 8px 14px;
      border: none;
      border-radius: 28px;
      font-weight: 600;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.12s ease;
      touch-action: manipulation;
      letter-spacing: 0.3px;
      background: #1f2a44;
      color: #b0c5ef;
      border: 1px solid #32456b;
      box-shadow: 0 3px 0 #0c1322;
      flex: 1;
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      -webkit-touch-callout: none;
      user-select: none;
    }
    .btn-action:active {
      transform: translateY(3px);
      box-shadow: 0 0px 0 #0c1322;
    }
    .btn-action:disabled {
      opacity: 0.4;
      transform: translateY(2px);
      box-shadow: 0 1px 0 #0c1322;
      cursor: not-allowed;
    }
    .btn-action.whatsapp {
      background: #25D366;
      color: #0a1a10;
      border: 1px solid #4ae08a;
      box-shadow: 0 3px 0 #158a45;
      font-weight: 700;
    }
    .btn-action.whatsapp:active { box-shadow: 0 0px 0 #158a45; }
    .btn-action.danger {
      background: #a83242;
      color: #fff;
      border: 1px solid #c94a5a;
      box-shadow: 0 3px 0 #5e1d28;
    }
    .btn-action.danger:active { box-shadow: 0 0px 0 #5e1d28; }
    
    /* === THUMBNAILS === */
    .thumbnails-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      justify-content: center;
      position: relative;
      z-index: 1;
    }
    .thumbnail {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      background: #0a111f;
      border: 2px solid #1a2642;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-shrink: 0;
      -webkit-touch-callout: none;
      user-select: none;
    }
    .thumbnail:active { transform: scale(0.92); }
    .thumbnail.active {
      border-color: #ff5e7c;
      box-shadow: 0 0 16px rgba(255,94,124,0.15);
    }
    .thumbnail.has-image { border-color: #4ade80; }
    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .thumbnail .thumb-placeholder { font-size: 1.3rem; opacity: 0.3; color: #4a5f89; }
    .thumbnail .thumb-number {
      position: absolute;
      top: 3px;
      right: 5px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      font-size: 0.5rem;
      font-weight: 700;
      color: #fff;
      padding: 1px 7px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    /* === FULLSCREEN MODAL === */
    .fullscreen-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
      animation: fadeIn 0.3s ease;
    }
    .fullscreen-modal.active { display: flex; }
    .fullscreen-modal .modal-content {
      max-width: 500px;
      width: 100%;
      position: relative;
    }
    .fullscreen-modal .modal-content img {
      width: 100%;
      height: auto;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 16px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
    }
    .fullscreen-modal .modal-close {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.6);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 1.3rem;
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fullscreen-modal .modal-close:active { transform: scale(0.9); }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    
    /* === STATUS BAR === */
    .status-bar {
      background: #0c1322;
      border-radius: 30px;
      padding: 6px 14px;
      font-size: 0.65rem;
      color: #8a9fc9;
      text-align: center;
      border: 1px solid #1a2642;
      margin-top: 10px;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-weight: 450;
      min-height: 32px;
    }
    .status-bar .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .status-bar .status-dot.green { background: #4ade80; }
    .status-bar .status-dot.yellow { background: #facc15; }
    .status-bar .status-dot.red { background: #f87171; }
    .status-bar .status-dot.gray { background: #4a5f89; }
    
    /* === SETTINGS MODAL === */
    .settings-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10001;
      padding: 20px;
      animation: fadeIn 0.25s ease;
    }
    .settings-modal.active { display: flex; }
    .settings-modal .modal-content {
      background: #141d31;
      border-radius: 28px;
      padding: 24px;
      max-width: 400px;
      width: 100%;
      border: 1px solid #2d4068;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }
    .settings-modal .modal-content .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #1f2a44;
    }
    .settings-modal .modal-content .modal-header h3 {
      color: #eef4ff;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .settings-modal .modal-content .modal-header .close-settings {
      background: none;
      border: none;
      color: #6a7ea8;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
    }
    .settings-modal .modal-content .modal-header .close-settings:active { color: #f87171; }
    .settings-modal .modal-content .settings-list {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .settings-modal .modal-content .settings-list::-webkit-scrollbar {
      width: 3px;
    }
    .settings-modal .modal-content .settings-list::-webkit-scrollbar-track {
      background: #0a111f;
      border-radius: 10px;
    }
    .settings-modal .modal-content .settings-list::-webkit-scrollbar-thumb {
      background: #2d3d60;
      border-radius: 10px;
    }
    
    /* === SETTINGS ITEMS === */
    .settings-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 12px;
      background: #0a111f;
      margin-bottom: 6px;
      border: 1px solid #1a2642;
      transition: 0.15s;
    }
    .settings-item .item-checkbox {
      width: 20px;
      height: 20px;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-appearance: none;
      appearance: none;
      background: #0a111f;
      border: 2px solid #2d3d60;
      border-radius: 4px;
      position: relative;
      transition: 0.15s;
    }
    .settings-item .item-checkbox:checked {
      background: #ff5e7c;
      border-color: #ff5e7c;
    }
    .settings-item .item-checkbox:checked::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
    }
    .settings-item .item-text {
      flex: 1;
      font-size: 0.8rem;
      color: #b0c5ef;
      word-break: break-word;
    }
    .settings-item .item-actions {

    /* === ADD SUGGESTION MODAL === */

    /* === RESPONSIVE === */
    @media (max-width: 420px) {
      .app { padding: 10px 10px 14px; border-radius: 32px; }

  </style>

<body>
<div class="app" id="app">
  <span class="version-badge" id="versionBadge">v1.0.0</span>
  
  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="left-group">
      <div class="camera-status">
        <span class="dot off" id="cameraDot"></span>
        <span id="cameraStatusText">Off</span>
      </div>
    </div>
    <div class="right-group">
      <button class="install-btn hidden" id="installBtn">📲 Install</button>
      <button class="settings-btn" id="settingsBtn" title="Manage Suggestions">
        ⚙️
        <span class="badge-dot" id="settingsBadge"></span>
      </button>
      <button class="perm-btn-sm" id="permissionBtn">
        <span class="icon">📷</span>
        <span id="permText">Allow Camera</span>
      </button>
    </div>
  </div>

  <!-- TICKET BOX WITH SUGGESTIONS -->
  <div class="ticket-section">
    <div class="ticket-box">
      <div class="label-row">
        <span class="tag">📝 Message</span>
        <span class="hint">
          <span id="charCount">0</span>
          <button class="clear-btn" id="clearTextBtn" title="Clear text">✕</button>
        </span>
      </div>
      <input type="text" id="ticketText" placeholder="Type or select suggestions..." value="" autocomplete="off">
      
      <div class="suggestions-header">
        <span class="label">💡 Suggestions <span id="selectedCount">(0 selected)</span></span>
        <button class="add-btn" id="addSuggestionBtn">➕ Add</button>
      </div>
      <div class="suggestions" id="suggestionsContainer">
        <!-- Rendered by JS -->
      </div>
    </div>
  </div>

  <!-- BIG CAMERA PREVIEW -->
  <div class="camera-container">
    <div class="camera-preview" id="cameraPreview">
      <div class="placeholder" id="mainPlaceholder">
        <span class="big-icon">📷</span>
        <span class="main-text">Camera Starting...</span>
        <span class="sub-text">Please allow camera access</span>
      </div>
      <video id="liveVideo" autoplay playsinline muted webkit-playsinline style="display:none;"></video>
      <img id="mainPreviewImg" style="display:none;" alt="Preview">
    </div>

    <div class="camera-controls">
      <button class="btn-action danger" id="retakeBtn" disabled>🔄 Retake</button>
      <button class="btn-capture" id="captureBtn">
        <div class="inner-circle"></div>
      </button>
      <button class="btn-action whatsapp" id="sendBtn" disabled>💬 Send</button>
    </div>
  </div>

  <!-- THUMBNAILS -->
  <div class="thumbnails-row">
    <div class="thumbnail" id="thumb0" data-index="0">
      <span class="thumb-placeholder">📷</span>
      <span class="thumb-number">1</span>
    </div>
    <div class="thumbnail" id="thumb1" data-index="1">
      <span class="thumb-placeholder">📷</span>
      <span class="thumb-number">2</span>
    </div>
  </div>

  <!-- STATUS -->
  <div class="status-bar">
    <span class="status-dot gray" id="statusDot"></span>
    <span id="statusText">Initializing camera...</span>
  </div>
</div>

<!-- FULLSCREEN MODAL -->
<div class="fullscreen-modal" id="fullscreenModal">
  <div class="modal-content">
    <button class="modal-close" id="modalClose">✕</button>
    <img id="modalImg" src="" alt="Full view">
  </div>
</div>

<!-- ADD SUGGESTION MODAL -->
<div class="add-suggestion-modal" id="addSuggestionModal">
  <div class="modal-content">
    <h3>➕ Add Suggestion</h3>
    <input type="text" id="newSuggestionInput" placeholder="Enter suggestion text..." maxlength="50" autocomplete="off">
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelAddBtn">Cancel</button>
      <button class="btn-confirm" id="confirmAddBtn">Add</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="settings-modal" id="settingsModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>⚙️ Manage Suggestions</h3>
      <button class="close-settings" id="closeSettingsBtn">✕</button>
    </div>
    <div class="settings-list" id="settingsList">
      <!-- Rendered by JS -->
    </div>
    <div class="settings-actions">
      <button class="btn-delete-selected" id="deleteSelectedBtn" disabled>🗑️ Delete Selected</button>
      <button class="btn-clear-all" id="clearAllDataBtn">🧹 Clear All Data</button>
      <button class="btn-done" id="doneSettingsBtn">✅ Done</button>
    </div>
  </div>
</div>

<!-- CLEAR DATA CONFIRMATION MODAL -->
<div class="clear-data-modal" id="clearDataModal">
  <div class="modal-content">
    <div class="warning-icon">⚠️</div>
    <h3>Clear All Data?</h3>
    <p>This will permanently delete all your suggestions and reset the app to default.</p>
    <div class="modal-actions">
      <button class="btn-cancel-clear" id="cancelClearBtn">Cancel</button>
      <button class="btn-confirm-clear" id="confirmClearBtn">Yes, Clear Everything</button>
    </div>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ============================================================
    // APP VERSION & CONFIG
    // ============================================================
    const APP_VERSION = '1.0.0';
    const STORAGE_KEY = 'beddecor_suggestions';
    const VERSION_KEY = 'beddecor_version';

    // ============================================================
    // STATE
    // ============================================================
    const state = {
      photos: [
        { dataUrl: null },
        { dataUrl: null }
      ],
      cameraReady: false,
      selectedIndex: 0,
      suggestions: [],
      selectedSuggestions: [],
      editingIndex: -1,
      videoStream: null,
      isVideoRunning: false,
      isInitializing: false
    };

    // ============================================================
    // DOM REFS
    // ============================================================
    var mainPreviewImg = document.getElementById('mainPreviewImg');
    var mainPlaceholder = document.getElementById('mainPlaceholder');
    var cameraPreview = document.getElementById('cameraPreview');
    var liveVideo = document.getElementById('liveVideo');
    var thumbnails = [document.getElementById('thumb0'), document.getElementById('thumb1')];
    var ticketInput = document.getElementById('ticketText');
    var charCount = document.getElementById('charCount');
    var clearTextBtn = document.getElementById('clearTextBtn');
    var suggestionsContainer = document.getElementById('suggestionsContainer');
    var selectedCount = document.getElementById('selectedCount');
    var addSuggestionBtn = document.getElementById('addSuggestionBtn');
    var addModal = document.getElementById('addSuggestionModal');
    var newSuggestionInput = document.getElementById('newSuggestionInput');
    var confirmAddBtn = document.getElementById('confirmAddBtn');
    var cancelAddBtn = document.getElementById('cancelAddBtn');
    var statusText = document.getElementById('statusText');
    var statusDot = document.getElementById('statusDot');
    var captureBtn = document.getElementById('captureBtn');
    var retakeBtn = document.getElementById('retakeBtn');
    var sendBtn = document.getElementById('sendBtn');
    var modal = document.getElementById('fullscreenModal');
    var modalImg = document.getElementById('modalImg');
    var modalClose = document.getElementById('modalClose');
    var permBtn = document.getElementById('permissionBtn');
    var permText = document.getElementById('permText');
    var cameraDot = document.getElementById('cameraDot');
    var cameraStatusText = document.getElementById('cameraStatusText');
    var settingsBtn = document.getElementById('settingsBtn');
    var settingsModal = document.getElementById('settingsModal');
    var settingsList = document.getElementById('settingsList');
    var closeSettingsBtn = document.getElementById('closeSettingsBtn');
    var doneSettingsBtn = document.getElementById('doneSettingsBtn');
    var deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
    var clearAllDataBtn = document.getElementById('clearAllDataBtn');
    var clearDataModal = document.getElementById('clearDataModal');
    var cancelClearBtn = document.getElementById('cancelClearBtn');
    var confirmClearBtn = document.getElementById('confirmClearBtn');
    var settingsBadge = document.getElementById('settingsBadge');
    var versionBadge = document.getElementById('versionBadge');
    var installBtn = document.getElementById('installBtn');

    // ============================================================
    // VERSION MANAGEMENT
    // ============================================================
    function checkVersion() {
      try {
        var savedVersion = localStorage.getItem(VERSION_KEY);
        if (savedVersion !== APP_VERSION) {
          localStorage.setItem(VERSION_KEY, APP_VERSION);
        }
      } catch (e) {}
      versionBadge.textContent = 'v' + APP_VERSION;
    }

    // ============================================================
    // LOCAL STORAGE
    // ============================================================
    function loadSuggestions() {
      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          var parsed = JSON.parse(saved);
          if (Array.isArray(parsed) && parsed.length > 0) {
            state.suggestions = parsed;
            return;
          }
        }
      } catch (e) {}
      state.suggestions = [];
    }

    function saveSuggestions() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.suggestions));
        updateSettingsBadge();
      } catch (e) {}
    }

    function clearAllData() {
      try {
        localStorage.removeItem(STORAGE_KEY);
        localStorage.setItem(VERSION_KEY, APP_VERSION);
        state.suggestions = [];
        state.selectedSuggestions = [];
        ticketInput.value = '';
        updateCharCount();
        renderSuggestions();
        renderSettings();
        setStatus('🧹 All data cleared!', 'info');
        updateSettingsBadge();
      } catch (e) {}
    }

    function updateSettingsBadge() {
      if (state.suggestions.length > 0) {
        settingsBadge.classList.add('show');
      } else {
        settingsBadge.classList.remove('show');
      }
    }

    // ============================================================
    // HELPERS
    // ============================================================
    function setStatus(msg, type) {
      type = type || 'info';
      statusText.textContent = msg;
      statusDot.className = 'status-dot';
      if (type === 'success') statusDot.classList.add('green');
      else if (type === 'warning') statusDot.classList.add('yellow');
      else if (type === 'error') statusDot.classList.add('red');
      else statusDot.classList.add('gray');
    }

    function setCameraStatus(ready, msg) {
      state.cameraReady = ready;
      cameraDot.className = 'dot' + (ready ? ' on' : ' off');
      cameraStatusText.textContent = msg || (ready ? 'Ready' : 'Off');
      updateButtons();
    }

    function updateButtons() {
      var hasPhotos = state.photos.some(function(p) { return p.dataUrl; });
      var allFilled = state.photos.every(function(p) { return p.dataUrl; });
      captureBtn.disabled = !state.cameraReady || allFilled || state.isInitializing;
      captureBtn.classList.toggle('has-photos', hasPhotos);
      retakeBtn.disabled = !hasPhotos || !state.cameraReady;
      sendBtn.disabled = !hasPhotos || !state.cameraReady;
    }

    function updateCharCount() {
      charCount.textContent = ticketInput.value.length;
    }

    // ============================================================
    // CAMERA - START LIVE VIDEO
    // ============================================================
    function startCamera() {
      if (state.isVideoRunning) return Promise.resolve(true);
      if (state.isInitializing) return Promise.resolve(false);

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus('❌ Camera not supported', 'error');
        return Promise.resolve(false);
      }

      state.isInitializing = true;
      setStatus('📷 Starting camera...', 'warning');

      return navigator.mediaDevices.getUserMedia({
        video: { 
          facingMode: 'environment',
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      })
      .then(function(stream) {
        state.videoStream = stream;
        
        // iOS fix: set srcObject after stream is ready
        liveVideo.srcObject = stream;
        liveVideo.setAttribute('playsinline', 'true');
        liveVideo.setAttribute('webkit-playsinline', 'true');
        liveVideo.muted = true;
        liveVideo.style.display = 'block';
        liveVideo.style.width = '100%';
        liveVideo.style.height = '100%';
        liveVideo.style.minHeight = '380px';
        liveVideo.style.objectFit = 'cover';
        liveVideo.style.borderRadius = '18px';
        liveVideo.style.background = '#080e1a';
        
        // Hide placeholder, show video
        mainPlaceholder.style.display = 'none';
        mainPreviewImg.style.display = 'none';
        liveVideo.style.display = 'block';
        
        // Wait for video to be ready
        return new Promise(function(resolve) {
          if (liveVideo.readyState >= 2) {
            resolve();
          } else {
            liveVideo.addEventListener('loadeddata', resolve, { once: true });
            // Fallback timeout
            setTimeout(resolve, 3000);
          }
        });
      })
      .then(function() {
        // Try to play video
        return liveVideo.play().catch(function() {
          console.log('Autoplay prevented, waiting for user interaction');
          setStatus('📱 Tap the screen to start camera', 'warning');
          return Promise.resolve();
        });
      })
      .then(function() {
        state.isVideoRunning = true;
        state.cameraReady = true;
        setCameraStatus(true, 'Live');
        setStatus('📸 Camera ready! Tap capture.', 'success');
        permBtn.className = 'perm-btn-sm granted';
        permText.textContent = '✅ Ready';
        state.isInitializing = false;
        renderMainView();
        return true;
      })
      .catch(function(error) {
        console.error('Camera error:', error);
        state.isInitializing = false;
        
        if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
          setStatus('⚠️ Camera denied. Tap "Allow Camera".', 'error');
          permBtn.className = 'perm-btn-sm denied';
          permText.textContent = '⚠️ Allow';
        } else if (error.name === 'NotFoundError' || error.name === 'DevicesNotFoundError') {
          setStatus('❌ No camera found on this device', 'error');
          permBtn.className = 'perm-btn-sm denied';
          permText.textContent = '❌ No Camera';
        } else {
          setStatus('❌ Camera error: ' + error.message, 'error');
          permBtn.className = 'perm-btn-sm denied';
          permText.textContent = '❌ Error';
        }
        return false;
      });
    }

    function stopCamera() {
      if (state.videoStream) {
        state.videoStream.getTracks().forEach(function(t) {
          try { t.stop(); } catch (e) {}
        });
        state.videoStream = null;
      }
      state.isVideoRunning = false;
      liveVideo.style.display = 'none';
      liveVideo.srcObject = null;
    }

    // ============================================================
    // PERMISSION BUTTON
    // ============================================================
    permBtn.addEventListener('click', function() {
      if (this.disabled) return;
      if (state.isVideoRunning) {
        setStatus('📸 Camera already running', 'success');
        return;
      }
      startCamera();
    });

    // ============================================================
    // SUGGESTIONS RENDER
    // ============================================================
    function renderSuggestions() {
      suggestionsContainer.innerHTML = '';
      
      if (state.suggestions.length === 0) {
        var empty = document.createElement('div');
        empty.className = 'empty-suggestions';
        empty.textContent = 'No suggestions yet. Tap "➕ Add" to create one.';
        suggestionsContainer.appendChild(empty);
        return;
      }

      state.suggestions.forEach(function(text) {
        var chip = document.createElement('div');
        chip.className = 'suggestion-chip';
        if (state.selectedSuggestions.indexOf(text) !== -1) {
          chip.classList.add('selected');
        }
        chip.innerHTML = '<span class="chip-text">' + text + '</span>';
        chip.addEventListener('click', function(e) {
          e.preventDefault();
          toggleSuggestion(text);
        });
        suggestionsContainer.appendChild(chip);
      });
      updateSelectedCount();
      updateMessageFromSuggestions();
    }

    function updateSelectedCount() {
      selectedCount.textContent = '(' + state.selectedSuggestions.length + ' selected)';
    }

    function toggleSuggestion(text) {
      var index = state.selectedSuggestions.indexOf(text);
      if (index === -1) {
        state.selectedSuggestions.push(text);
      } else {
        state.selectedSuggestions.splice(index, 1);
      }
      renderSuggestions();
    }

    function updateMessageFromSuggestions() {
      if (state.selectedSuggestions.length > 0) {
        var combined = state.selectedSuggestions.join(' · ');
        if (ticketInput.value !== combined) {
          ticketInput.value = combined;
          updateCharCount();
        }
      }
    }

    // ============================================================
    // SETTINGS RENDER
    // ============================================================
    function renderSettings() {
      settingsList.innerHTML = '';
      
      if (state.suggestions.length === 0) {
        var empty = document.createElement('div');
        empty.className = 'settings-empty';
        empty.textContent = 'No suggestions yet. Add some from the main screen.';
        settingsList.appendChild(empty);
        deleteSelectedBtn.disabled = true;
        return;
      }
      
      state.suggestions.forEach(function(text, index) {
        var item = document.createElement('div');
        item.className = 'settings-item';
        if (state.editingIndex === index) {
          item.classList.add('editing');
        }
        
        var checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'item-checkbox';
        checkbox.dataset.index = index;
        checkbox.addEventListener('change', updateDeleteButton);
        checkbox.addEventListener('touchstart', function(e) {
          e.stopPropagation();
        });
        
        var textSpan = document.createElement('span');
        textSpan.className = 'item-text';
        textSpan.textContent = text;
        
        var actions = document.createElement('div');
        actions.className = 'item-actions';
        
        if (state.editingIndex === index) {
          var editInput = document.createElement('input');
          editInput.type = 'text';
          editInput.className = 'edit-input';
          editInput.value = text;
          editInput.maxLength = 50;
          editInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') saveEdit(index, editInput.value);
            if (e.key === 'Escape') { state.editingIndex = -1; renderSettings(); }
          });
          
          var saveBtn = document.createElement('button');
          saveBtn.className = 'edit-save-btn';
          saveBtn.textContent = 'Save';
          saveBtn.addEventListener('click', function(e) {
            e.preventDefault();
            saveEdit(index, editInput.value);
          });
          
          item.appendChild(editInput);
          item.appendChild(saveBtn);
          setTimeout(function() { editInput.focus(); }, 100);
        } else {
          var editBtn = document.createElement('button');
          editBtn.className = 'edit-btn';
          editBtn.textContent = '✏️';
          editBtn.title = 'Edit';
          editBtn.addEventListener('click', function(e) {
            e.preventDefault();
            state.editingIndex = index;
            renderSettings();
          });
          
          var deleteBtn = document.createElement('button');
          deleteBtn.className = 'delete-btn';
          deleteBtn.textContent = '🗑️';
          deleteBtn.title = 'Delete';
          deleteBtn.addEventListener('click', function(e) {
            e.preventDefault();
            if (confirm('Remove "' + text + '" from suggestions?')) {
              deleteSuggestion(index);
            }
          });
          
          actions.appendChild(editBtn);
          actions.appendChild(deleteBtn);
          item.appendChild(checkbox);
          item.appendChild(textSpan);
          item.appendChild(actions);
        }
        
        settingsList.appendChild(item);
      });
      
      updateDeleteButton();
    }

    function saveEdit(index, newText) {
      var trimmed = newText.trim();
      if (!trimmed) {
        setStatus('⚠️ Please enter a valid suggestion', 'warning');
        return;
      }
      var oldText = state.suggestions[index];
      if (trimmed !== oldText && state.suggestions.indexOf(trimmed) !== -1) {
        setStatus('⚠️ Suggestion already exists', 'warning');
        return;
      }
      state.suggestions[index] = trimmed;
      var selIndex = state.selectedSuggestions.indexOf(oldText);
      if (selIndex !== -1) {
        state.selectedSuggestions[selIndex] = trimmed;
      }
      state.editingIndex = -1;
      saveSuggestions();
      renderSettings();
      renderSuggestions();
      setStatus('✅ Updated suggestion', 'success');
    }

    function deleteSuggestion(index) {
      var text = state.suggestions[index];
      state.suggestions.splice(index, 1);
      var selIndex = state.selectedSuggestions.indexOf(text);
      if (selIndex !== -1) {
        state.selectedSuggestions.splice(selIndex, 1);
      }
      if (state.editingIndex === index) state.editingIndex = -1;
      saveSuggestions();
      renderSettings();
      renderSuggestions();
      setStatus('🗑️ Removed: "' + text + '"', 'info');
    }

    function updateDeleteButton() {
      var checked = settingsList.querySelectorAll('.item-checkbox:checked');
      deleteSelectedBtn.disabled = checked.length === 0;
      if (checked.length > 0) {
        deleteSelectedBtn.textContent = '🗑️ Delete Selected (' + checked.length + ')';
      } else {
        deleteSelectedBtn.textContent = '🗑️ Delete Selected';
      }
    }

    // ============================================================
    // ADD SUGGESTION
    // ============================================================
    function addSuggestion(text) {
      var trimmed = text.trim();
      if (!trimmed) {
        setStatus('⚠️ Please enter a suggestion', 'error');
        return;
      }
      if (state.suggestions.indexOf(trimmed) !== -1) {
        setStatus('⚠️ Suggestion already exists', 'warning');
        return;
      }
      state.suggestions.push(trimmed);
      saveSuggestions();
      renderSuggestions();
      renderSettings();
      setStatus('✅ Added: "' + trimmed + '"', 'success');
      newSuggestionInput.value = '';
      addModal.classList.remove('active');
    }

    // ============================================================
    // SETTINGS EVENTS
    // ============================================================
    settingsBtn.addEventListener('click', function(e) {
      e.preventDefault();
      state.editingIndex = -1;
      renderSettings();
      settingsModal.classList.add('active');
      this.classList.add('active');
    });

    closeSettingsBtn.addEventListener('click', function(e) {
      e.preventDefault();
      settingsModal.classList.remove('active');
      settingsBtn.classList.remove('active');
    });

    doneSettingsBtn.addEventListener('click', function(e) {
      e.preventDefault();
      settingsModal.classList.remove('active');
      settingsBtn.classList.remove('active');
      setStatus('✅ Settings saved', 'success');
    });

    deleteSelectedBtn.addEventListener('click', function(e) {
      e.preventDefault();
      var checked = settingsList.querySelectorAll('.item-checkbox:checked');
      if (checked.length === 0) return;
      
      var indices = Array.from(checked).map(function(cb) { return parseInt(cb.dataset.index); }).sort(function(a,b) { return b - a; });
      var texts = indices.map(function(i) { return state.suggestions[i]; });
      
      if (confirm('Delete ' + texts.length + ' suggestion(s)?')) {
        indices.forEach(function(i) {
          var text = state.suggestions[i];
          state.suggestions.splice(i, 1);
          var selIndex = state.selectedSuggestions.indexOf(text);
          if (selIndex !== -1) {
            state.selectedSuggestions.splice(selIndex, 1);
          }
        });
        saveSuggestions();
        renderSettings();
        renderSuggestions();
        setStatus('🗑️ Deleted ' + texts.length + ' suggestion(s)', 'info');
      }
    });

    clearAllDataBtn.addEventListener('click', function(e) {
      e.preventDefault();
      clearDataModal.classList.add('active');
    });

    cancelClearBtn.addEventListener('click', function(e) {
      e.preventDefault();
      clearDataModal.classList.remove('active');
    });

    confirmClearBtn.addEventListener('click', function(e) {
      e.preventDefault();
      clearAllData();
      clearDataModal.classList.remove('active');
      renderSettings();
    });

    settingsModal.addEventListener('click', function(e) {
      if (e.target === this) {
        settingsModal.classList.remove('active');
        settingsBtn.classList.remove('active');
      }
    });

    clearDataModal.addEventListener('click', function(e) {
      if (e.target === this) {
        clearDataModal.classList.remove('active');
      }
    });

    // ============================================================
    // ADD SUGGESTION MODAL EVENTS
    // ============================================================
    addSuggestionBtn.addEventListener('click', function(e) {
      e.preventDefault();
      addModal.classList.add('active');
      newSuggestionInput.value = '';
      setTimeout(function() { newSuggestionInput.focus(); }, 150);
    });

    cancelAddBtn.addEventListener('click', function(e) {
      e.preventDefault();
      addModal.classList.remove('active');
    });

    confirmAddBtn.addEventListener('click', function(e) {
      e.preventDefault();
      addSuggestion(newSuggestionInput.value);
    });

    newSuggestionInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        addSuggestion(this.value);
      }
      if (e.key === 'Escape') {
        addModal.classList.remove('active');
      }
    });

    addModal.addEventListener('click', function(e) {
      if (e.target === this) {
        addModal.classList.remove('active');
      }
    });

    // ============================================================
    // TICKET INPUT
    // ============================================================
    ticketInput.addEventListener('input', function() {
      updateCharCount();
      var currentValue = this.value;
      var combinedSelected = state.selectedSuggestions.join(' · ');
      
      if (currentValue !== combinedSelected) {
        var matched = false;
        for (var i = 0; i < state.suggestions.length; i++) {
          var text = state.suggestions[i];
          if (currentValue === text) {
            matched = true;
            if (state.selectedSuggestions.indexOf(text) === -1) {
              state.selectedSuggestions = [text];
              renderSuggestions();
            }
            break;
          }
        }
        if (!matched && currentValue === '') {
          state.selectedSuggestions = [];
          renderSuggestions();
        }
      }
    });

    clearTextBtn.addEventListener('click', function(e) {
      e.preventDefault();
      ticketInput.value = '';
      state.selectedSuggestions = [];
      updateCharCount();
      renderSuggestions();
      setStatus('🗑️ Message cleared', 'info');
    });

    // ============================================================
    // RENDER
    // ============================================================
    function renderMainView() {
      var photo = state.photos[state.selectedIndex];
      if (photo.dataUrl) {
        liveVideo.style.display = 'none';
        mainPreviewImg.src = photo.dataUrl;
        mainPreviewImg.style.display = 'block';
        mainPlaceholder.style.display = 'none';
        cameraPreview.classList.add('has-image');
      } else if (state.isVideoRunning) {
        liveVideo.style.display = 'block';
        mainPreviewImg.style.display = 'none';
        mainPlaceholder.style.display = 'none';
        cameraPreview.classList.remove('has-image');
      } else {
        liveVideo.style.display = 'none';
        mainPreviewImg.style.display = 'none';
        mainPlaceholder.style.display = 'flex';
        cameraPreview.classList.remove('has-image');
      }
      updateThumbnails();
      updateButtons();
    }

    function updateThumbnails() {
      for (var i = 0; i < 2; i++) {
        var thumb = thumbnails[i];
        var photo = state.photos[i];
        var existingImg = thumb.querySelector('img');
        var placeholder = thumb.querySelector('.thumb-placeholder');

        if (photo.dataUrl) {
          if (!existingImg) {
            var img = document.createElement('img');
            img.src = photo.dataUrl;
            img.alt = 'Photo ' + (i+1);
            img.loading = 'lazy';
            thumb.insertBefore(img, placeholder);
            thumb.classList.add('has-image');
          } else {
            existingImg.src = photo.dataUrl;
          }
          if (placeholder) placeholder.style.display = 'none';
        } else {
          if (existingImg) existingImg.remove();
          if (placeholder) placeholder.style.display = 'block';
          thumb.classList.remove('has-image');
        }
        thumb.classList.toggle('active', i === state.selectedIndex);
      }
    }

    // ============================================================
    // CAPTURE PHOTO
    // ============================================================
    function capturePhoto() {
      if (!state.cameraReady) {
        startCamera().then(function(started) {
          if (started) {
            setTimeout(capturePhoto, 300);
          }
        });
        return;
      }

      if (!liveVideo.videoWidth || !liveVideo.videoHeight) {
        setStatus('⏳ Camera not ready, please wait...', 'warning');
        return;
      }

      var slot = -1;
      for (var i = 0; i < 2; i++) {
        if (!state.photos[i].dataUrl) {
          slot = i;
          break;
        }
      }
      if (slot === -1) {
        setStatus('⚠️ Both filled! Retake.', 'warning');
        return;
      }

      setStatus('📷 Capturing...', 'warning');

      try {
        var canvas = document.createElement('canvas');
        var videoWidth = liveVideo.videoWidth || 1280;
        var videoHeight = liveVideo.videoHeight || 720;
        canvas.width = videoWidth;
        canvas.height = videoHeight;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(liveVideo, 0, 0, canvas.width, canvas.height);

        var dataUrl = canvas.toDataURL('image/jpeg', 0.92);
        state.photos[slot].dataUrl = dataUrl;
        state.selectedIndex = slot;

        renderMainView();
        setStatus('✅ Photo ' + (slot+1) + ' captured!', 'success');
      } catch (error) {
        console.error('Capture error:', error);
        setStatus('❌ Capture error: ' + error.message, 'error');
      }
    }

    // ============================================================
    // RETAKE
    // ============================================================
    function retakePhoto() {
      var idx = state.selectedIndex;
      if (!state.photos[idx].dataUrl) {
        for (var i = 0; i < 2; i++) {
          if (state.photos[i].dataUrl) {
            state.selectedIndex = i;
            break;
          }
        }
      }
      var slot = state.selectedIndex;
      if (!state.photos[slot].dataUrl) {
        setStatus('⚠️ No photo to retake', 'warning');
        return;
      }
      state.photos[slot].dataUrl = null;
      renderMainView();
      if (!state.photos.some(function(p) { return p.dataUrl; }) && state.isVideoRunning) {
        liveVideo.style.display = 'block';
        mainPreviewImg.style.display = 'none';
        mainPlaceholder.style.display = 'none';
      }
      setStatus('🔄 Photo ' + (slot+1) + ' removed', 'info');
    }

    // ============================================================
    // SEND WHATSAPP
    // ============================================================
    function sendWhatsApp() {
      var photosWithData = state.photos.filter(function(p) { return p.dataUrl !== null; });
      if (photosWithData.length === 0) {
        setStatus('⚠️ No photos to send', 'error');
        return;
      }

      var ticket = ticketInput.value || '';
      var message = '';
      if (ticket) {
        message = '🏨 *' + ticket + '*%0a%0a';
      } else {
        message = '🏨 *Bed Decoration Photos*%0a%0a';
      }

      state.photos.forEach(function(p, idx) {
        if (p.dataUrl) {
          message += '📸 Photo ' + (idx+1) + '%0a';
        }
      });

      var firstPhoto = photosWithData[0];
      var encodedMsg = encodeURIComponent(message);

      if (navigator.share && firstPhoto.dataUrl) {
        fetch(firstPhoto.dataUrl)
          .then(function(res) { return res.blob(); })
          .then(function(blob) {
            var file = new File([blob], 'bed_photo_1.jpg', { type: 'image/jpeg' });
            var shareData = {
              title: ticket || 'Bed Decor',
              text: ticket || 'Bed decoration photos',
              files: [file]
            };
            if (navigator.canShare && navigator.canShare(shareData)) {
              navigator.share(shareData)
                .then(function() { setStatus('✅ Shared!', 'success'); })
                .catch(function(err) {
                  if (err.name !== 'AbortError') setStatus('⚠️ Cancelled', 'warning');
                });
            } else {
              window.open('https://api.whatsapp.com/send?text=' + encodedMsg, '_blank');
              setStatus('📤 WhatsApp opened', 'info');
            }
          })
          .catch(function() {
            window.open('https://api.whatsapp.com/send?text=' + encodedMsg, '_blank');
            setStatus('📤 WhatsApp opened', 'info');
          });
      } else {
        window.open('https://api.whatsapp.com/send?text=' + encodedMsg, '_blank');
        setStatus('📤 WhatsApp opened', 'info');
      }
    }

    // ============================================================
    // THUMBNAIL CLICKS
    // ============================================================
    thumbnails.forEach(function(thumb, idx) {
      thumb.addEventListener('click', function(e) {
        e.preventDefault();
        if (state.photos[idx].dataUrl) {
          modalImg.src = state.photos[idx].dataUrl;
          modal.classList.add('active');
        } else {
          state.selectedIndex = idx;
          renderMainView();
          setStatus('📸 Slot ' + (idx+1) + ' selected', 'info');
        }
      });
    });

    // ============================================================
    // MODAL
    // ============================================================
    modalClose.addEventListener('click', function(e) {
      e.preventDefault();
      modal.classList.remove('active');
    });
    modal.addEventListener('click', function(e) {
      if (e.target === this) {
        modal.classList.remove('active');
      }
    });

    // ============================================================
    // PWA INSTALL
    // ============================================================
    var deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.classList.remove('hidden');
    });

    installBtn.addEventListener('click', function(e) {
      e.preventDefault();
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(result) {
          if (result.outcome === 'accepted') {
            setStatus('✅ App installed!', 'success');
          }
          deferredPrompt = null;
          installBtn.classList.add('hidden');
        });
      }
    });

    window.addEventListener('appinstalled', function() {
      setStatus('🎉 App installed successfully!', 'success');
      installBtn.classList.add('hidden');
    });

    // ============================================================
    // EVENT LISTENERS
    // ============================================================
    captureBtn.addEventListener('click', capturePhoto);
    retakeBtn.addEventListener('click', retakePhoto);
    sendBtn.addEventListener('click', sendWhatsApp);

    // Handle visibility change - restart camera if needed
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'visible') {
        if (!state.isVideoRunning && state.cameraReady) {
          startCamera();
        }
      }
    });

    // ============================================================
    // iOS Safari - user interaction handler
    // ============================================================
    var touchHandler = function() {
      if (!state.isVideoRunning && !state.cameraReady) {
        startCamera();
      }
      document.removeEventListener('touchstart', touchHandler);
    };
    document.addEventListener('touchstart', touchHandler, { once: true, passive: true });

    // ============================================================
    // INIT
    // ============================================================
    function init() {
      checkVersion();
      loadSuggestions();
      renderSuggestions();
      renderMainView();
      updateCharCount();
      updateSettingsBadge();
      
      setStatus('📷 Starting camera...', 'info');
      
      // Auto-start camera on load with a small delay for iOS
      setTimeout(function() {
        startCamera().then(function(started) {
          if (!started) {
            setStatus('📷 Tap "Allow Camera" to start', 'warning');
          }
        });
      }, 300);
    }

    init();
  })();
</script>
</body>
</html>
