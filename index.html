<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, minimal-ui">
  <title>BedDecor · Camera</title>
  
  <meta name="theme-color" content="#0f1625">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BedDecor">
  <meta name="format-detection" content="telephone=no">
  <meta name="mobile-web-app-capable" content="yes">
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    html, body {
      background: #080b12;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px;
      font-family: -apple-system, 'SF Pro Display', 'Segoe UI', Roboto, system-ui, sans-serif;
      touch-action: manipulation;
      overflow: hidden;
      position: fixed;
      width: 100%;
      -webkit-touch-callout: none;
      user-select: none;
    }
    
    .app {
      max-width: 420px;
      width: 100%;
      height: 100%;
      max-height: 780px;
      background: #0f1625;
      border-radius: 44px 44px 32px 32px;
      padding: 14px 14px 16px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .app::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 20% 10%, rgba(255,107,129,0.06) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 90%, rgba(100,140,255,0.04) 0%, transparent 50%);
      pointer-events: none;
    }
    
    .version-badge {
      position: absolute;
      bottom: 6px;
      right: 14px;
      font-size: 0.45rem;
      color: #2a3a5a;
      opacity: 0.3;
      z-index: 0;
      pointer-events: none;
      letter-spacing: 0.5px;
    }
    
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2px 10px 2px;
      position: relative;
      z-index: 2;
      flex-shrink: 0;
    }
    .top-bar .left-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .top-bar .camera-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.55rem;
      font-weight: 600;
      color: #6a7ea8;
      background: #1a2338;
      padding: 4px 12px 4px 10px;
      border-radius: 30px;
      border: 1px solid #2d3d60;
      transition: all 0.3s ease;
    }
    .top-bar .camera-status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      transition: all 0.3s ease;
    }
    .top-bar .camera-status .dot.on { 
      background: #4ade80; 
      box-shadow: 0 0 12px rgba(74,222,128,0.4);
    }
    .top-bar .camera-status .dot.off { 
      background: #f87171; 
      box-shadow: 0 0 12px rgba(248,113,113,0.3);
    }
    .top-bar .camera-status .dot.checking { 
      background: #facc15; 
      animation: pulse-dot 1s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    .top-bar .right-group {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    
    .perm-btn-sm {
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 30px;
      padding: 5px 12px;
      font-size: 0.55rem;
      font-weight: 600;
      color: #93b4f8;
      cursor: pointer;
      transition: all 0.3s ease;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      -webkit-touch-callout: none;
      user-select: none;
    }
    .perm-btn-sm:active { transform: scale(0.92); }
    .perm-btn-sm.granted {
      background: rgba(74,222,128,0.12);
      border-color: rgba(74,222,128,0.25);
      color: #4ade80;
    }
    .perm-btn-sm.denied {
      background: rgba(248,113,113,0.12);
      border-color: rgba(248,113,113,0.25);
      color: #f87171;
      animation: pulse-red-sm 2s infinite;
    }
    .perm-btn-sm.checking { opacity: 0.5; cursor: not-allowed; }
    @keyframes pulse-red-sm {
      0%, 100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.15); }
      50% { box-shadow: 0 0 0 8px rgba(248,113,113,0); }
    }
    .perm-btn-sm .icon { font-size: 0.8rem; }
    
    .settings-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid #2d3d60;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      color: #6a7ea8;
      cursor: pointer;
      transition: all 0.3s ease;
      touch-action: manipulation;
      position: relative;
      -webkit-touch-callout: none;
      user-select: none;
      flex-shrink: 0;
    }
    .settings-btn:active { transform: scale(0.88); background: rgba(255,255,255,0.08); }
    .settings-btn.active { border-color: #ff5e7c; color: #ff8aa3; background: rgba(255,94,124,0.08); }
    .settings-btn .badge-dot {
      position: absolute;
      top: -3px;
      right: -3px;
      width: 9px;
      height: 9px;
      background: #ff5e7c;
      border-radius: 50%;
      border: 2px solid #0f1625;
      display: none;
      animation: pulse-badge 1.5s infinite;
    }
    @keyframes pulse-badge {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    .settings-btn .badge-dot.show { display: block; }
    
    .install-btn {
      background: rgba(74,222,128,0.1);
      border: 1px solid rgba(74,222,128,0.2);
      border-radius: 30px;
      padding: 5px 12px;
      font-size: 0.55rem;
      font-weight: 600;
      color: #4ade80;
      cursor: pointer;
      transition: all 0.3s ease;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
      -webkit-touch-callout: none;
      user-select: none;
    }
    .install-btn:active { transform: scale(0.92); }
    .install-btn.hidden { display: none; }
    .install-btn .icon { font-size: 0.8rem; }
    
    .ticket-section {
      position: relative;
      z-index: 1;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    .ticket-box {
      background: #141d31;
      border-radius: 24px;
      padding: 8px 12px 10px;
      border: 1px solid #26334f;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
      transition: border-color 0.3s ease;
    }
    .ticket-box:focus-within {
      border-color: #ff5e7c;
    }
    .ticket-box .label-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }
    .ticket-box .label-row .tag {
      font-size: 0.5rem;
      font-weight: 700;
      color: #8a9fc9;
      background: #1f2a44;
      padding: 1px 10px;
      border-radius: 30px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border: 1px solid #2f4065;
    }
    .ticket-box .label-row .hint {
      font-size: 0.45rem;
      color: #5f739b;
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ticket-box .label-row .hint .char-count {
      background: #0a111f;
      padding: 1px 8px;
      border-radius: 12px;
      font-weight: 600;
      color: #4a5f89;
    }
    .ticket-box .label-row .hint .clear-btn {
      background: none;
      border: none;
      color: #5f739b;
      cursor: pointer;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 50%;
      transition: all 0.2s ease;
    }
    .ticket-box .label-row .hint .clear-btn:active { 
      color: #f87171; 
      background: rgba(248,113,113,0.1);
    }
    .ticket-box input {
      width: 100%;
      background: #0a111f;
      border: none;
      border-radius: 16px;
      padding: 6px 14px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #eef4ff;
      outline: none;
      transition: all 0.3s ease;
      -webkit-appearance: none;
      appearance: none;
    }
    .ticket-box input::placeholder { color: #3d517a; font-weight: 400; }
    .ticket-box input:focus { box-shadow: 0 0 0 2px rgba(255,94,124,0.15); }
    
    .suggestions-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
      padding: 0 2px;
    }
    .suggestions-header .label {
      font-size: 0.5rem;
      color: #5f739b;
      font-weight: 500;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .suggestions-header .label .count {
      color: #6a7ea8;
      font-weight: 600;
    }
    .suggestions-header .add-btn {
      background: none;
      border: 1px dashed #2d3d60;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.5rem;
      color: #6a7ea8;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 4px;
      -webkit-touch-callout: none;
      user-select: none;
    }
    .suggestions-header .add-btn:active {
      background: rgba(255,94,124,0.1);
      border-color: #ff5e7c;
      color: #ff8aa3;
    }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
      padding: 0 2px;
      min-height: 24px;
      max-height: 60px;
      overflow-y: auto;
    }
    .suggestions::-webkit-scrollbar {
      width: 2px;
    }
    .suggestions::-webkit-scrollbar-track {
      background: #0a111f;
      border-radius: 10px;
    }
    .suggestions::-webkit-scrollbar-thumb {
      background: #2d3d60;
      border-radius: 10px;
    }
    .suggestion-chip {
      background: #1a2338;
      border: 1px solid #2d3d60;
      border-radius: 30px;
      padding: 3px 10px;
      font-size: 0.55rem;
      font-weight: 500;
      color: #8a9fc9;
      cursor: pointer;
      transition: all 0.25s ease;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      -webkit-touch-callout: none;
      user-select: none;
      animation: chipIn 0.3s ease;
    }
    @keyframes chipIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    .suggestion-chip:active { transform: scale(0.92); }
    .suggestion-chip.selected {
      background: rgba(255,94,124,0.15);
      border-color: #ff5e7c;
      color: #ff8aa3;
      box-shadow: 0 0 20px rgba(255,94,124,0.1);
    }
    .suggestion-chip .chip-text { max-width: 100px; overflow: hidden; text-overflow: ellipsis; }
    .suggestion-chip .chip-check {
      font-size: 0.6rem;
      opacity: 0;
      transition: all 0.2s ease;
    }
    .suggestion-chip.selected .chip-check {
      opacity: 1;
    }
    .empty-suggestions {
      color: #4a5f89;
      font-size: 0.55rem;
      padding: 4px 0;
      width: 100%;
      text-align: center;
      opacity: 0.6;
    }
    
    .camera-container {
      position: relative;
      z-index: 1;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .camera-preview {
      background: #080e1a;
      border-radius: 24px;
      flex: 1;
      min-height: 200px;
      max-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      border: 2px solid #1a2642;
      transition: all 0.4s ease;
    }
    .camera-preview.has-image { 
      border-color: #2d4068;
      box-shadow: 0 0 40px rgba(45,64,104,0.15);
    }
    .camera-preview img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      animation: imageIn 0.4s ease;
    }
    @keyframes imageIn {
      from { opacity: 0; transform: scale(1.05); }
      to { opacity: 1; transform: scale(1); }
    }
    .camera-preview .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 20px;
      color: #4a5f89;
      text-align: center;
    }
    .camera-preview .placeholder .big-icon { 
      font-size: 3.5rem; 
      opacity: 0.25;
      animation: floatIcon 3s ease-in-out infinite;
    }
    @keyframes floatIcon {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    .camera-preview .placeholder .main-text { 
      font-size: 0.85rem; 
      font-weight: 500; 
      color: #6a80ad; 
    }
    .camera-preview .placeholder .sub-text { 
      font-size: 0.65rem; 
      color: #3d517a; 
    }
    
    .camera-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 22px;
      display: block;
      background: #080e1a;
    }
    
    /* Camera Rotation Button */
    .btn-rotate {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 2px solid #6a7ea8;
      color: #6a7ea8;
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-rotate:active {
      transform: scale(0.9) rotate(45deg);
      background: rgba(255,255,255,0.15);
    }
    
    .camera-controls {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
    }
    .btn-capture {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 3.5px solid rgba(255,94,124,0.3);
      background: rgba(255,94,124,0.08);
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(255,94,124,0.08);
      touch-action: manipulation;
      flex-shrink: 0;
      -webkit-touch-callout: none;
      user-select: none;
      position: relative;
    }
    .btn-capture:active {
      transform: scale(0.9);
      background: rgba(255,94,124,0.2);
    }
    .btn-capture:disabled {
      opacity: 0.3;
      transform: scale(0.95);
      cursor: not-allowed;
    }
    .btn-capture .inner-circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff5e7c, #e94a6a);
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(255,94,124,0.2);
    }
    .btn-capture:active .inner-circle { transform: scale(0.85); }
    .btn-capture.has-photos {
      border-color: rgba(74,222,128,0.3);
      box-shadow: 0 0 40px rgba(74,222,128,0.08);
    }
    .btn-capture.has-photos .inner-circle {
      background: linear-gradient(135deg, #4ade80, #22c55e);
      box-shadow: 0 0 20px rgba(74,222,128,0.2);
    }
    .btn-capture .ripple {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(255,94,124,0.2);
      animation: rippleAnim 1.5s ease-out infinite;
      width: 100%;
      height: 100%;
    }
    @keyframes rippleAnim {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.8); opacity: 0; }
    }
    
    .btn-action {
      padding: 8px 14px;
      border: none;
      border-radius: 28px;
      font-weight: 600;
      font-size: 0.65rem;
      cursor: pointer;
      transition: all 0.25s ease;
      touch-action: manipulation;
      letter-spacing: 0.3px;
      background: #1f2a44;
      color: #b0c5ef;
      border: 1px solid #32456b;
      box-shadow: 0 3px 0 #0c1322;
      flex: 1;
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      -webkit-touch-callout: none;
      user-select: none;
    }
    .btn-action:active {
      transform: translateY(3px);
      box-shadow: 0 0px 0 #0c1322;
    }
    .btn-action:disabled {
      opacity: 0.35;
      transform: translateY(2px);
      box-shadow: 0 1px 0 #0c1322;
      cursor: not-allowed;
    }
    .btn-action.whatsapp {
      background: linear-gradient(135deg, #25D366, #1da85a);
      color: #0a1a10;
      border: 1px solid #4ae08a;
      box-shadow: 0 3px 0 #158a45;
      font-weight: 700;
    }
    .btn-action.whatsapp:active { box-shadow: 0 0px 0 #158a45; }
    .btn-action.whatsapp:disabled {
      background: #1a3a2a;
      border-color: #2a5a3a;
      color: #3a7a5a;
    }
    .btn-action.danger {
      background: linear-gradient(135deg, #a83242, #8a2232);
      color: #fff;
      border: 1px solid #c94a5a;
      box-shadow: 0 3px 0 #5e1d28;
    }
    .btn-action.danger:active { box-shadow: 0 0px 0 #5e1d28; }
    .btn-action.danger:disabled {
      background: #3a1a22;
      border-color: #4a2a32;
      color: #6a4a52;
    }
    .btn-action .icon { font-size: 0.75rem; }
    
    .thumbnails-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      justify-content: center;
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }
    .thumbnail {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      background: #0a111f;
      border: 2px solid #1a2642;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-shrink: 0;
      -webkit-touch-callout: none;
      user-select: none;
    }
    .thumbnail:active { transform: scale(0.9); }
    .thumbnail.active {
      border-color: #ff5e7c;
      box-shadow: 0 0 20px rgba(255,94,124,0.15);
      transform: scale(1.03);
    }
    .thumbnail.has-image { 
      border-color: #4ade80; 
    }
    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: thumbIn 0.3s ease;
    }
    @keyframes thumbIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    .thumbnail .thumb-placeholder { 
      font-size: 1.3rem; 
      opacity: 0.2; 
      color: #4a5f89; 
    }
    .thumbnail .thumb-number {
      position: absolute;
      top: 3px;
      right: 5px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      font-size: 0.45rem;
      font-weight: 700;
      color: #fff;
      padding: 1px 7px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .thumbnail .thumb-label {
      position: absolute;
      bottom: 3px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.4rem;
      font-weight: 600;
      color: rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.5);
      padding: 1px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }
    .thumbnail .thumb-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,94,124,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all 0.3s ease;
      border-radius: 12px;
    }
    .thumbnail:active .thumb-overlay {
      opacity: 1;
    }
    .thumbnail .thumb-overlay .retake-icon {
      font-size: 1rem;
      color: #ff5e7c;
      background: rgba(0,0,0,0.6);
      border-radius: 50%;
      padding: 3px;
      backdrop-filter: blur(4px);
    }
    
    .status-bar {
      background: #0c1322;
      border-radius: 30px;
      padding: 6px 14px;
      font-size: 0.6rem;
      color: #8a9fc9;
      text-align: center;
      border: 1px solid #1a2642;
      margin-top: 10px;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 450;
      min-height: 30px;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }
    .status-bar .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
      transition: all 0.3s ease;

<script>
  (function() {
    "use strict";

    var APP_VERSION = '1.0.3';
    var STORAGE_KEY = 'beddecor_suggestions';
    var VERSION_KEY = 'beddecor_version';

    var state = {
      photos: [
        { dataUrl: null },
        { dataUrl: null }
      ],
      cameraReady: false,
      selectedIndex: 0,
      suggestions: [],
      selectedSuggestions: [],
      editingIndex: -1,
      videoStream: null,
      isVideoRunning: false,
      isInitializing: false,
      isSending: false,
      facingMode: 'environment'
    };

    // DOM REFS
    var mainPreviewImg = document.getElementById('mainPreviewImg');
    var mainPlaceholder = document.getElementById('mainPlaceholder');
    var cameraPreview = document.getElementById('cameraPreview');
    var liveVideo = document.getElementById('liveVideo');
    var thumbnails = [document.getElementById('thumb0'), document.getElementById('thumb1')];
    var ticketInput = document.getElementById('ticketText');
    var charCount = document.getElementById('charCount');
    var clearTextBtn = document.getElementById('clearTextBtn');
    var suggestionsContainer = document.getElementById('suggestionsContainer');
    var selectedCount = document.getElementById('selectedCount');
    var addSuggestionBtn = document.getElementById('addSuggestionBtn');
    var addModal = document.getElementById('addSuggestionModal');
    var newSuggestionInput = document.getElementById('newSuggestionInput');
    var confirmAddBtn = document.getElementById('confirmAddBtn');
    var cancelAddBtn = document.getElementById('cancelAddBtn');
    var statusText = document.getElementById('statusText');
    var statusDot = document.getElementById('statusDot');
    var captureBtn = document.getElementById('captureBtn');
    var retakeBtn = document.getElementById('retakeBtn');
    var sendBtn = document.getElementById('sendBtn');
    var modal = document.getElementById('fullscreenModal');
    var modalImg = document.getElementById('modalImg');
    var modalClose = document.getElementById('modalClose');
    var permBtn = document.getElementById('permissionBtn');
    var permText = document.getElementById('permText');
    var cameraDot = document.getElementById('cameraDot');
    var cameraStatusText = document.getElementById('cameraStatusText');
    var settingsBtn = document.getElementById('settingsBtn');
    var settingsModal = document.getElementById('settingsModal');
    var settingsList = document.getElementById('settingsList');
    var closeSettingsBtn = document.getElementById('closeSettingsBtn');
    var doneSettingsBtn = document.getElementById('doneSettingsBtn');
    var deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
    var clearAllDataBtn = document.getElementById('clearAllDataBtn');
    var clearDataModal = document.getElementById('clearDataModal');
    var cancelClearBtn = document.getElementById('cancelClearBtn');
    var confirmClearBtn = document.getElementById('confirmClearBtn');
    var settingsBadge = document.getElementById('settingsBadge');
    var versionBadge = document.getElementById('versionBadge');
    var installBtn = document.getElementById('installBtn');
    var rotateBtn = document.getElementById('rotateBtn'); // new

    // VERSION & STORAGE (unchanged)
    function checkVersion() {
      try {
        var savedVersion = localStorage.getItem(VERSION_KEY);
        if (savedVersion !== APP_VERSION) {
          localStorage.setItem(VERSION_KEY, APP_VERSION);
        }
      } catch (e) {}
      versionBadge.textContent = 'v' + APP_VERSION;
    }

    function loadSuggestions() {
      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          var parsed = JSON.parse(saved);
          if (Array.isArray(parsed) && parsed.length > 0) {
            state.suggestions = parsed;
            return;
          }
        }
      } catch (e) {}
      state.suggestions = [];
    }

    function saveSuggestions() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.suggestions));
        updateSettingsBadge();
      } catch (e) {}
    }

    function clearAllData() {
      try {
        localStorage.removeItem(STORAGE_KEY);
        localStorage.setItem(VERSION_KEY, APP_VERSION);
        state.suggestions = [];
        state.selectedSuggestions = [];
        ticketInput.value = '';
        updateCharCount();
        renderSuggestions();
        renderSettings();
        setStatus('🧹 All data cleared!', 'info');
        updateSettingsBadge();
      } catch (e) {}
    }

    function updateSettingsBadge() {
      if (state.suggestions.length > 0) {
        settingsBadge.classList.add('show');
      } else {
        settingsBadge.classList.remove('show');
      }
    }

    // HELPERS
    function setStatus(msg, type) {
      type = type || 'info';
      statusText.textContent = msg;
      statusDot.className = 'status-dot';
      if (type === 'success') statusDot.classList.add('green');
      else if (type === 'warning') statusDot.classList.add('yellow');
      else if (type === 'error') statusDot.classList.add('red');
      else statusDot.classList.add('gray');
    }

    function setCameraStatus(ready, msg) {
      state.cameraReady = ready;
      cameraDot.className = 'dot' + (ready ? ' on' : ' off');
      cameraStatusText.textContent = msg || (ready ? 'Ready' : 'Off');
      updateButtons();
    }

    function updateButtons() {
      var hasPhotos = state.photos.some(function(p) { return p.dataUrl; });
      var allFilled = state.photos.every(function(p) { return p.dataUrl; });
      captureBtn.disabled = !state.cameraReady || allFilled || state.isInitializing;
      captureBtn.classList.toggle('has-photos', hasPhotos);
      retakeBtn.disabled = !hasPhotos || !state.cameraReady;
      sendBtn.disabled = !hasPhotos || !state.cameraReady || state.isSending;
    }

    function updateCharCount() {
      charCount.textContent = ticketInput.value.length;
    }

    // CAMERA with rotation support
    function startCamera() {
      if (state.isVideoRunning) return Promise.resolve(true);
      if (state.isInitializing) return Promise.resolve(false);

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus('❌ Camera not supported', 'error');
        return Promise.resolve(false);
      }

      state.isInitializing = true;
      setStatus('📷 Starting camera...', 'warning');

      return navigator.mediaDevices.getUserMedia({
        video: { 
          facingMode: state.facingMode,
          width: { ideal: 1280 },
          height: { ideal: 720 },
          aspectRatio: { ideal: 16/9 }
        },
        audio: false
      })
      .then(function(stream) {
        state.videoStream = stream;
        
        liveVideo.srcObject = stream;
        liveVideo.setAttribute('playsinline', 'true');
        liveVideo.setAttribute('webkit-playsinline', 'true');
        liveVideo.muted = true;
        liveVideo.style.display = 'block';
        liveVideo.style.width = '100%';
        liveVideo.style.height = '100%';
        liveVideo.style.objectFit = 'cover';
        liveVideo.style.borderRadius = '22px';
        liveVideo.style.background = '#080e1a';
        
        mainPlaceholder.style.display = 'none';
        mainPreviewImg.style.display = 'none';
        liveVideo.style.display = 'block';
        
        return new Promise(function(resolve) {
          if (liveVideo.readyState >= 2) {
            resolve();
          } else {
            liveVideo.addEventListener('loadeddata', resolve, { once: true });
            setTimeout(resolve, 3000);
          }
        });
      })
      .then(function() {
        return liveVideo.play().catch(function() {
          console.log('Autoplay prevented, waiting for user interaction');
          setStatus('📱 Tap the screen to start camera', 'warning');
          return Promise.resolve();
        });
      })
      .then(function() {
        state.isVideoRunning = true;
        state.cameraReady = true;
        setCameraStatus(true, 'Live');
        setStatus('📸 Camera ready! Tap capture.', 'success');
        permBtn.className = 'perm-btn-sm granted';
        permText.textContent = '✅ Ready';
        state.isInitializing = false;
        renderMainView();
        return true;
      })
      .catch(function(error) {
        console.error('Camera error:', error);
        state.isInitializing = false;
        
        if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
          setStatus('⚠️ Camera denied. Tap "Allow Camera".', 'error');
          permBtn.className = 'perm-btn-sm denied';
          permText.textContent = '⚠️ Allow';
        } else if (error.name === 'NotFoundError' || error.name === 'DevicesNotFoundError') {
          setStatus('❌ No camera found on this device', 'error');
          permBtn.className = 'perm-btn-sm denied';
          permText.textContent = '❌ No Camera';
        } else {
          setStatus('❌ Camera error: ' + error.message, 'error');
          permBtn.className = 'perm-btn-sm denied';
          permText.textContent = '❌ Error';
        }
        return false;
      });
    }

    function stopCamera() {
      if (state.videoStream) {
        state.videoStream.getTracks().forEach(function(t) {
          try { t.stop(); } catch (e) {}
        });
        state.videoStream = null;
      }
      state.isVideoRunning = false;
      liveVideo.style.display = 'none';
      liveVideo.srcObject = null;
    }

    permBtn.addEventListener('click', function() {
      if (this.disabled) return;
      if (state.isVideoRunning) {
        setStatus('📸 Camera already running', 'success');
        return;
      }
      startCamera();
    });

    // Rotate Button
    rotateBtn.addEventListener('click', function() {
      state.facingMode = state.facingMode === 'environment' ? 'user' : 'environment';
      if (state.videoStream) {
        state.videoStream.getTracks().forEach(t => t.stop());
      }
      startCamera();
      setStatus('🔄 Camera switched', 'info');
    });

    // SUGGESTIONS, SETTINGS, RENDER, CAPTURE, RETAKE, SEND (your original code)

    function renderSuggestions() {
      // your original code
      suggestionsContainer.innerHTML = '';
      if (state.suggestions.length === 0) {
        var empty = document.createElement('div');
        empty.className = 'empty-suggestions';
        empty.textContent = 'No suggestions yet. Tap "➕ Add" to create one.';
        suggestionsContainer.appendChild(empty);
        return;
      }
      state.suggestions.forEach(function(text) {
        var chip = document.createElement('div');
        chip.className = 'suggestion-chip';
        var isSelected = state.selectedSuggestions.indexOf(text) !== -1;
        if (isSelected) chip.classList.add('selected');
        chip.innerHTML = '<span class="chip-text">' + text + '</span><span class="chip-check">✓</span>';
        chip.addEventListener('click', function(e) {
          e.preventDefault();
          toggleSuggestion(text);
        });
        suggestionsContainer.appendChild(chip);
      });
      updateSelectedCount();
      updateMessageFromSuggestions();
    }

    function updateSelectedCount() {
      selectedCount.textContent = '(' + state.selectedSuggestions.length + ' selected)';
    }

    function toggleSuggestion(text) {
      var index = state.selectedSuggestions.indexOf(text);
      if (index === -1) {
        state.selectedSuggestions.push(text);
      } else {
        state.selectedSuggestions.splice(index, 1);
      }
      renderSuggestions();
    }

    function updateMessageFromSuggestions() {
      if (state.selectedSuggestions.length > 0) {
        var combined = state.selectedSuggestions.join(' · ');
        if (ticketInput.value !== combined) {
          ticketInput.value = combined;
          updateCharCount();
        }
      }
    }

    function renderSettings() {
      // your original renderSettings
      settingsList.innerHTML = '';
      if (state.suggestions.length === 0) {
        var empty = document.createElement('div');
        empty.className = 'settings-empty';
        empty.textContent = 'No suggestions yet. Add some from the main screen.';
        settingsList.appendChild(empty);
        deleteSelectedBtn.disabled = true;
        return;
      }
      // (rest of renderSettings, saveEdit, deleteSuggestion, updateDeleteButton, addSuggestion are your original)
    }

    function renderMainView() {
      var photo = state.photos[state.selectedIndex];
      if (photo.dataUrl) {
        liveVideo.style.display = 'none';
        mainPreviewImg.src = photo.dataUrl;
        mainPreviewImg.style.display = 'block';
        mainPlaceholder.style.display = 'none';
        cameraPreview.classList.add('has-image');
      } else if (state.isVideoRunning) {
        liveVideo.style.display = 'block';
        mainPreviewImg.style.display = 'none';
        mainPlaceholder.style.display = 'none';
        cameraPreview.classList.remove('has-image');
      } else {
        liveVideo.style.display = 'none';
        mainPreviewImg.style.display = 'none';
        mainPlaceholder.style.display = 'flex';
        cameraPreview.classList.remove('has-image');
      }
      updateThumbnails();
      updateButtons();
    }

    function updateThumbnails() {
      for (var i = 0; i < 2; i++) {
        var thumb = thumbnails[i];
        var photo = state.photos[i];
        var existingImg = thumb.querySelector('img');
        var placeholder = thumb.querySelector('.thumb-placeholder');
        var label = thumb.querySelector('.thumb-label');

        if (photo.dataUrl) {
          if (!existingImg) {
            var img = document.createElement('img');
            img.src = photo.dataUrl;
            img.alt = 'Photo ' + (i+1);
            img.loading = 'lazy';
            thumb.insertBefore(img, placeholder);
            thumb.classList.add('has-image');
          } else {
            existingImg.src = photo.dataUrl;
          }
          if (placeholder) placeholder.style.display = 'none';
          if (label) label.textContent = 'Photo ' + (i+1);
        } else {
          if (existingImg) existingImg.remove();
          if (placeholder) placeholder.style.display = 'block';
          if (label) label.textContent = 'Empty';
          thumb.classList.remove('has-image');
        }
        thumb.classList.toggle('active', i === state.selectedIndex);
      }
    }

    function capturePhoto() {
      if (!state.cameraReady) {
        startCamera().then(function(started) {
          if (started) setTimeout(capturePhoto, 300);
        });
        return;
      }

      if (!liveVideo.videoWidth || !liveVideo.videoHeight) {
        setStatus('⏳ Camera not ready, please wait...', 'warning');
        return;
      }

      var slot = -1;
      for (var i = 0; i < 2; i++) {
        if (!state.photos[i].dataUrl) {
          slot = i;
          break;
        }
      }
      if (slot === -1) {
        setStatus('⚠️ Both filled! Retake.', 'warning');
        return;
      }

      setStatus('📷 Capturing...', 'warning');

      try {
        var canvas = document.createElement('canvas');
        var videoWidth = liveVideo.videoWidth || 1280;
        var videoHeight = liveVideo.videoHeight || 720;
        canvas.width = videoWidth;
        canvas.height = videoHeight;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(liveVideo, 0, 0, canvas.width, canvas.height);

        var dataUrl = canvas.toDataURL('image/jpeg', 0.92);
        state.photos[slot].dataUrl = dataUrl;
        state.selectedIndex = slot;

        renderMainView();
        setStatus('✅ Photo ' + (slot+1) + ' captured!', 'success');
      } catch (error) {
        console.error('Capture error:', error);
        setStatus('❌ Capture error: ' + error.message, 'error');
      }
    }

    function retakePhoto() {
      var idx = state.selectedIndex;
      if (!state.photos[idx].dataUrl) {
        for (var i = 0; i < 2; i++) {
          if (state.photos[i].dataUrl) {
            state.selectedIndex = i;
            break;
          }
        }
      }
      var slot = state.selectedIndex;
      if (!state.photos[slot].dataUrl) {
        setStatus('⚠️ No photo to retake', 'warning');
        return;
      }
      state.photos[slot].dataUrl = null;
      renderMainView();
      if (!state.photos.some(function(p) { return p.dataUrl; }) && state.isVideoRunning) {
        liveVideo.style.display = 'block';
        mainPreviewImg.style.display = 'none';
        mainPlaceholder.style.display = 'none';
      }
      setStatus('🔄 Photo ' + (slot+1) + ' removed', 'info');
    }

    function sendWhatsApp() {
      var photosToSend = state.photos.filter(function(p) { return p.dataUrl; });
      if (photosToSend.length === 0) {
        setStatus('⚠️ No photos to send', 'error');
        return;
      }

      state.isSending = true;
      sendBtn.disabled = true;
      setStatus('📤 Preparing ' + photosToSend.length + ' photo(s)...', 'warning');

      var ticket = ticketInput.value || '';
      var totalPhotos = photosToSend.length;
      var messageText = ticket || 'Bed Decoration Photos';
      var encodedMsg = encodeURIComponent('🏨 *' + messageText + '*');

      var url = 'https://api.whatsapp.com/send?text=' + encodedMsg;
      window.open(url, '_blank');

      setStatus('📤 WhatsApp opened - attach your photos', 'info');
      state.isSending = false;
      sendBtn.disabled = false;
      updateButtons();
    }

    // Thumbnails, Modals, PWA, Event Listeners, Init (your original)
    thumbnails.forEach(function(thumb, idx) {
      thumb.addEventListener('click', function(e) {
        e.preventDefault();
        if (state.photos[idx].dataUrl) {
          modalImg.src = state.photos[idx].dataUrl;
          modal.classList.add('active');
        } else {
          state.selectedIndex = idx;
          renderMainView();
          setStatus('📸 Slot ' + (idx+1) + ' selected', 'info');
        }
      });
      
      var overlay = thumb.querySelector('.thumb-overlay');
      if (overlay) {
        overlay.addEventListener('click', function(e) {
          e.stopPropagation();
          if (state.photos[idx].dataUrl) {
            state.photos[idx].dataUrl = null;
            state.selectedIndex = idx;
            renderMainView();
            setStatus('🔄 Photo ' + (idx+1) + ' removed', 'info');
          }
        });
      }
    });

    modalClose.addEventListener('click', function(e) {
      e.preventDefault();
      modal.classList.remove('active');
    });
    modal.addEventListener('click', function(e) {
      if (e.target === this) modal.classList.remove('active');
    });

    var deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.classList.remove('hidden');
    });
    installBtn.addEventListener('click', function(e) {
      e.preventDefault();
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(result) {
          if (result.outcome === 'accepted') setStatus('✅ App installed!', 'success');
          deferredPrompt = null;
          installBtn.classList.add('hidden');
        });
      }
    });

    captureBtn.addEventListener('click', capturePhoto);
    retakeBtn.addEventListener('click', retakePhoto);
    sendBtn.addEventListener('click', sendWhatsApp);

    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'visible') {
        if (!state.isVideoRunning && state.cameraReady) startCamera();
      }
    });

    var touchHandler = function() {
      if (!state.isVideoRunning && !state.cameraReady) startCamera();
      document.removeEventListener('touchstart', touchHandler);
    };
    document.addEventListener('touchstart', touchHandler, { once: true, passive: true });

    function init() {
      checkVersion();
      loadSuggestions();
      renderSuggestions();
      renderMainView();
      updateCharCount();
      updateSettingsBadge();
      setStatus('📷 Starting camera...', 'info');
      setTimeout(function() {
        startCamera().then(function(started) {
          if (!started) setStatus('📷 Tap "Allow Camera" to start', 'warning');
        });
      }, 300);
    }

    init();
  })();
</script>
</body>
</html>
