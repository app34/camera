<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>BedDecor · Camera</title>
  <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiQmVkRGVjb3IiLCJzaG9ydF9uYW1lIjoiQmVkRGVjb3IiLCJkZXNjcmlwdGlvbiI6IkJlZCBEZWNvcmF0aW9uIFBob3RvIENhbSIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwic3RhcnRfdXJsIjoiLiIsImljb25zIjpbeyJzcmMiOiJkYXRhOmltYWdlL3N2Zyt4bWwsPHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCA1MTIgNTEyJz48cmVjdCB3aWR0aD0nNTEyJyBoZWlnaHQ9JzUxMicgcng9JzYwJyBmaWxsPScjZmY1Njc4Jy8+PHRleHQgeD0nOTAnIHk9JzM1MCcgZm9udC1zaXplPScyODAnIGZpbGw9J3doaXRlJyBmb250LWZhbWlseT0nc2Fucy1zZXJpZic+8J+SvTwvdGV4dD48L3N2Zz4iLCJzaXplcyI6IjUxMng1MTIiLCJ0eXBlIjoiaW1hZ2Uvc3ZnK3htbCJ9XX0=">
  <style>
    /* === RESET & BASE === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #080b12;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      font-family: -apple-system, 'SF Pro Display', 'Segoe UI', Roboto, system-ui, sans-serif;
      touch-action: manipulation;
    }
    .app {
      max-width: 420px;
      width: 100%;
      background: #0f1625;
      border-radius: 44px 44px 32px 32px;
      padding: 18px 14px 22px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05), 0 0 0 1px rgba(255,255,255,0.04);
      position: relative;
      overflow: hidden;
    }
    .app::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 20% 10%, rgba(255,107,129,0.06) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 90%, rgba(100,140,255,0.04) 0%, transparent 50%);
      pointer-events: none;
    }
    /* === HEADER === */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px 12px 4px;
      position: relative;
      z-index: 1;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-left .logo {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ff8aa3, #ff5e7c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .header-left .logo-icon {
      font-size: 1.3rem;
      -webkit-text-fill-color: initial;
    }
    .header-left .sub {
      font-size: 0.6rem;
      font-weight: 600;
      color: #7a8db5;
      background: #1a2338;
      padding: 2px 12px;
      border-radius: 20px;
      border: 1px solid #2d3d60;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      -webkit-text-fill-color: #7a8db5;
    }
    .header-right .badge {
      background: #1a2338;
      border: 1px solid #2d3d60;
      border-radius: 30px;
      padding: 4px 14px;
      font-size: 0.55rem;
      font-weight: 600;
      color: #b6cbf5;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .header-right .badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      display: inline-block;
      animation: pulse-dot 2s infinite;
    }
    .header-right .badge .dot.off {
      background: #f87171;
      animation: none;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    /* === PERMISSION BUTTON === */
    .permission-section {
      position: relative;
      z-index: 2;
      margin-bottom: 12px;
    }
    .permission-btn {
      width: 100%;
      padding: 12px 20px;
      border: none;
      border-radius: 28px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 5px 0 rgba(0,0,0,0.3);
      touch-action: manipulation;
      letter-spacing: 0.3px;
    }
    .permission-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.3);
    }
    .permission-btn:disabled {
      opacity: 0.6;
      transform: translateY(2px);
      box-shadow: 0 3px 0 rgba(0,0,0,0.2);
      cursor: not-allowed;
    }
    .permission-btn .btn-icon { font-size: 1.4rem; }
    .permission-btn.request {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      border: 2px solid #60a5fa;
      animation: pulse-blue 2s infinite;
    }
    .permission-btn.granted {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      border: 2px solid #4ade80;
    }
    .permission-btn.denied {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: #fff;
      border: 2px solid #f87171;
      animation: pulse-red 2s infinite;
    }
    .permission-btn.checking {
      background: #374151;
      color: #9ca3af;
      border: 2px solid #4b5563;
    }
    @keyframes pulse-blue {
      0%, 100% { box-shadow: 0 5px 0 rgba(0,0,0,0.3), 0 0 0 0 rgba(59,130,246,0.4); }
      50% { box-shadow: 0 5px 0 rgba(0,0,0,0.3), 0 0 0 12px rgba(59,130,246,0); }
    }
    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 5px 0 rgba(0,0,0,0.3), 0 0 0 0 rgba(239,68,68,0.4); }
      50% { box-shadow: 0 5px 0 rgba(0,0,0,0.3), 0 0 0 12px rgba(239,68,68,0); }
    }
    .permission-status {
      text-align: center;
      margin-top: 6px;
      font-size: 0.7rem;
      color: #6a7ea8;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .permission-status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .permission-status .dot.green { background: #4ade80; }
    .permission-status .dot.red { background: #f87171; }
    .permission-status .dot.yellow { background: #facc15; }
    .permission-status .dot.gray { background: #4a5f89; }
    /* === TICKET BOX === */
    .ticket-box {
      background: #141d31;
      border-radius: 24px;
      padding: 10px 14px 12px;
      margin-bottom: 14px;
      border: 1px solid #26334f;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
      position: relative;
      z-index: 1;
    }
    .ticket-box .label-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .ticket-box .label-row .tag {
      font-size: 0.65rem;
      font-weight: 600;
      color: #8a9fc9;
      background: #1f2a44;
      padding: 2px 12px;
      border-radius: 30px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border: 1px solid #2f4065;
    }
    .ticket-box .label-row .hint {
      font-size: 0.55rem;
      color: #5f739b;
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .ticket-box .label-row .hint svg {
      width: 12px;
      height: 12px;
      fill: #4ade80;
    }
    .ticket-box input {
      width: 100%;
      background: #0a111f;
      border: none;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 0.95rem;
      font-weight: 500;
      color: #eef4ff;
      outline: none;
      transition: 0.2s;
    }
    .ticket-box input::placeholder {
      color: #3d517a;
      font-weight: 400;
    }
    .ticket-box input:focus {
      box-shadow: 0 0 0 2px rgba(255,94,124,0.2);
    }
    /* === MAIN CAMERA PREVIEW === */
    .camera-container {
      position: relative;
      z-index: 1;
      margin-bottom: 14px;
    }
    .camera-preview {
      background: #080e1a;
      border-radius: 24px;
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      border: 2px solid #1a2642;
      transition: all 0.3s ease;
    }
    .camera-preview.has-image {
      border-color: #2d4068;
    }
    .camera-preview img {
      width: 100%;
      height: auto;
      max-height: 400px;
      object-fit: contain;
      display: block;
    }
    .camera-preview .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 40px 20px;
      color: #4a5f89;
    }
    .camera-preview .placeholder .big-icon {
      font-size: 4rem;
      opacity: 0.3;
    }
    .camera-preview .placeholder .main-text {
      font-size: 1rem;
      font-weight: 500;
      color: #6a80ad;
    }
    .camera-preview .placeholder .sub-text {
      font-size: 0.75rem;
      color: #3d517a;
    }
    .camera-preview .text-overlay-display {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(10px);
      padding: 8px 24px;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      max-width: 92%;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid rgba(255,255,255,0.08);
      pointer-events: none;
    }
    .camera-preview .text-overlay-display.hidden {
      display: none;
    }
    /* === CAMERA CONTROLS === */
    .camera-controls {
      display: flex;
      gap: 12px;
      margin-top: 10px;
      justify-content: center;
      align-items: center;
    }
    .btn-capture {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 4px solid #ff5e7c;
      background: rgba(255,94,124,0.15);
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(255,94,124,0.2);
      touch-action: manipulation;
      flex-shrink: 0;
    }
    .btn-capture:active {
      transform: scale(0.92);
      background: rgba(255,94,124,0.3);
    }
    .btn-capture:disabled {
      opacity: 0.4;
      transform: scale(0.95);
      cursor: not-allowed;
    }
    .btn-capture .inner-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #ff5e7c;
      transition: all 0.2s ease;
    }
    .btn-capture:active .inner-circle {
      transform: scale(0.85);
    }
    .btn-capture.has-photos {
      border-color: #4ade80;
      box-shadow: 0 0 30px rgba(74,222,128,0.2);
    }
    .btn-capture.has-photos .inner-circle {
      background: #4ade80;
    }
    .btn-action {
      padding: 10px 18px;
      border: none;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.12s ease;
      touch-action: manipulation;
      letter-spacing: 0.3px;
      background: #1f2a44;
      color: #b0c5ef;
      border: 1px solid #32456b;
      box-shadow: 0 4px 0 #0c1322;
      flex: 1;
    }
    .btn-action:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #0c1322;
    }
    .btn-action:disabled {
      opacity: 0.4;
      transform: translateY(2px);
      box-shadow: 0 2px 0 #0c1322;
      cursor: not-allowed;
    }
    .btn-action.primary {
      background: linear-gradient(135deg, #ff5e7c, #e94a6a);
      color: #fff;
      border: 1px solid #ff7a94;
      box-shadow: 0 4px 0 #a33b4f;
    }
    .btn-action.primary:active {
      box-shadow: 0 1px 0 #a33b4f;
    }
    .btn-action.whatsapp {
      background: #25D366;
      color: #0a1a10;
      border: 1px solid #4ae08a;
      box-shadow: 0 4px 0 #158a45;
      font-weight: 700;
    }
    .btn-action.whatsapp:active {
      box-shadow: 0 1px 0 #158a45;
    }
    .btn-action.danger {
      background: #a83242;
      color: #fff;
      border: 1px solid #c94a5a;
      box-shadow: 0 4px 0 #5e1d28;
    }
    .btn-action.danger:active {
      box-shadow: 0 1px 0 #5e1d28;
    }
    /* === THUMBNAILS ROW === */
    .thumbnails-row {
      display: flex;
      gap: 12px;
      margin-top: 14px;
      justify-content: center;
      position: relative;
      z-index: 1;
    }
    .thumbnail {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      background: #0a111f;
      border: 2px solid #1a2642;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-shrink: 0;
    }
    .thumbnail:active {
      transform: scale(0.92);
    }
    .thumbnail.active {
      border-color: #ff5e7c;
      box-shadow: 0 0 20px rgba(255,94,124,0.2);
    }
    .thumbnail.has-image {
      border-color: #4ade80;
    }
    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .thumbnail .thumb-placeholder {
      font-size: 1.5rem;
      opacity: 0.3;
      color: #4a5f89;
    }
    .thumbnail .thumb-number {
      position: absolute;
      top: 4px;
      right: 6px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      font-size: 0.55rem;
      font-weight: 700;
      color: #fff;
      padding: 2px 8px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .thumbnail .thumb-retake {
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      font-size: 0.5rem;
      font-weight: 600;
      color: #f87171;
      padding: 2px 10px;
      border-radius: 12px;
      border: 1px solid rgba(248,113,113,0.2);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .thumbnail:hover .thumb-retake,
    .thumbnail:active .thumb-retake {
      opacity: 1;
    }
    /* === FULLSCREEN VIEW MODAL === */
    .fullscreen-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(20px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
      animation: fadeIn 0.3s ease;
    }
    .fullscreen-modal.active {
      display: flex;
    }
    .fullscreen-modal .modal-content {
      max-width: 500px;
      width: 100%;
      position: relative;
    }
    .fullscreen-modal .modal-content img {
      width: 100%;
      height: auto;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 20px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
    }
    .fullscreen-modal .modal-content .modal-text {
      text-align: center;
      margin-top: 16px;
      font-size: 1rem;
      font-weight: 600;
      color: #eef4ff;
      background: rgba(0,0,0,0.5);
      padding: 10px 20px;
      border-radius: 30px;
      backdrop-filter: blur(8px);
    }
    .fullscreen-modal .modal-close {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.6);
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 1.5rem;
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fullscreen-modal .modal-close:active {
      transform: scale(0.9);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    /* === STATUS === */
    .status-bar {
      background: #0c1322;
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 0.7rem;
      color: #8a9fc9;
      text-align: center;
      border: 1px solid #1a2642;
      margin-top: 10px;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 450;
      min-height: 38px;
    }
    .status-bar .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .status-bar .status-dot.green { background: #4ade80; }
    .status-bar .status-dot.yellow { background: #facc15; }
    .status-bar .status-dot.red { background: #f87171; }
    .status-bar .status-dot.gray { background: #4a5f89; }
    .footer {
      font-size: 0.55rem;
      color: #34466b;
      text-align: center;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #141d31;
      letter-spacing: 0.3px;
      position: relative;
      z-index: 1;
    }
    /* === RESPONSIVE === */
    @media (max-width: 420px) {
      .app { padding: 14px 10px 18px; border-radius: 32px; }
      .camera-preview { min-height: 240px; }
      .camera-preview .placeholder .big-icon { font-size: 3rem; }
      .thumbnail { width: 64px; height: 64px; }
      .btn-capture { width: 60px; height: 60px; }
      .btn-capture .inner-circle { width: 46px; height: 46px; }
    }
    @media (max-width: 360px) {
      .thumbnail { width: 54px; height: 54px; }
      .btn-capture { width: 54px; height: 54px; }
      .btn-capture .inner-circle { width: 42px; height: 42px; }
    }
  </style>
</head>
<body>
<div class="app">
  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <span class="logo"><span class="logo-icon">📸</span> Bed<span style="color:#ff5e7c; -webkit-text-fill-color:#ff5e7c;">Decor</span></span>
      <span class="sub">✦ Honeymoon</span>
    </div>
    <div class="header-right">
      <div class="badge" id="cameraBadge">
        <span class="dot" id="cameraDot"></span>
        <span id="cameraStatusText">Init</span>
      </div>
    </div>
  </div>

  <!-- PERMISSION BUTTON -->
  <div class="permission-section">
    <button class="permission-btn request" id="permissionBtn">
      <span class="btn-icon">📷</span>
      <span id="permMain">Tap to Allow Camera</span>
    </button>
    <div class="permission-status" id="permStatus">
      <span class="dot gray" id="permDot"></span>
      <span id="permLabel">Camera access required</span>
    </div>
  </div>

  <!-- TICKET BOX (Single text for both photos) -->
  <div class="ticket-box">
    <div class="label-row">
      <span class="tag">🎫 Ticket</span>
      <span class="hint">
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
        applies to all photos
      </span>
    </div>
    <input type="text" id="ticketText" placeholder="Room number &amp; message..." value="407 · HAPPY HONEYMOON">
  </div>

  <!-- MAIN CAMERA PREVIEW -->
  <div class="camera-container">
    <div class="camera-preview" id="cameraPreview">
      <div class="placeholder" id="mainPlaceholder">
        <span class="big-icon">📷</span>
        <span class="main-text">No photo yet</span>
        <span class="sub-text">Tap the capture button below</span>
      </div>
      <img id="mainPreviewImg" style="display:none;" alt="Preview">
      <div class="text-overlay-display hidden" id="mainTextOverlay"></div>
    </div>

    <!-- CAMERA CONTROLS -->
    <div class="camera-controls">
      <button class="btn-action" id="retakeBtn" disabled>🔄 Retake</button>
      <button class="btn-capture" id="captureBtn">
        <div class="inner-circle"></div>
      </button>
      <button class="btn-action whatsapp" id="sendBtn" disabled>💬 Send</button>
    </div>
  </div>

  <!-- THUMBNAILS -->
  <div class="thumbnails-row">
    <div class="thumbnail" id="thumb0" data-index="0">
      <span class="thumb-placeholder">📷</span>
      <span class="thumb-number">1</span>
      <span class="thumb-retake">✖ retake</span>
    </div>
    <div class="thumbnail" id="thumb1" data-index="1">
      <span class="thumb-placeholder">📷</span>
      <span class="thumb-number">2</span>
      <span class="thumb-retake">✖ retake</span>
    </div>
  </div>

  <!-- STATUS -->
  <div class="status-bar" id="statusMsg">
    <span class="status-dot gray" id="statusDot"></span>
    <span id="statusText">Ready to capture</span>
  </div>

  <!-- FOOTER -->
  <div class="footer">tap thumbnail to view full size · ticket text auto-attaches</div>
</div>

<!-- FULLSCREEN VIEW MODAL -->
<div class="fullscreen-modal" id="fullscreenModal">
  <div class="modal-content">
    <button class="modal-close" id="modalClose">✕</button>
    <img id="modalImg" src="" alt="Full view">
    <div class="modal-text" id="modalText"></div>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // --- STATE ---
    const state = {
      photos: [
        { dataUrl: null, text: "" },
        { dataUrl: null, text: "" }
      ],
      cameraReady: false,
      selectedIndex: 0, // which slot is currently selected for capture
    };

    // --- DOM REFS ---
    const mainPreviewImg = document.getElementById('mainPreviewImg');
    const mainPlaceholder = document.getElementById('mainPlaceholder');
    const mainTextOverlay = document.getElementById('mainTextOverlay');
    const cameraPreview = document.getElementById('cameraPreview');
    const thumbnails = [document.getElementById('thumb0'), document.getElementById('thumb1')];
    const ticketInput = document.getElementById('ticketText');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');
    const captureBtn = document.getElementById('captureBtn');
    const retakeBtn = document.getElementById('retakeBtn');
    const sendBtn = document.getElementById('sendBtn');
    const modal = document.getElementById('fullscreenModal');
    const modalImg = document.getElementById('modalImg');
    const modalText = document.getElementById('modalText');
    const modalClose = document.getElementById('modalClose');

    // Permission elements
    const permBtn = document.getElementById('permissionBtn');
    const permMain = document.getElementById('permMain');
    const permDot = document.getElementById('permDot');
    const permLabel = document.getElementById('permLabel');
    const cameraDot = document.getElementById('cameraDot');
    const cameraStatusText = document.getElementById('cameraStatusText');

    // --- HELPERS ---
    function setStatus(msg, type = 'info') {
      statusText.textContent = msg;
      statusDot.className = 'status-dot';
      if (type === 'success') statusDot.classList.add('green');
      else if (type === 'warning') statusDot.classList.add('yellow');
      else if (type === 'error') statusDot.classList.add('red');
      else statusDot.classList.add('gray');
    }

    function setCameraStatus(ready, msg) {
      state.cameraReady = ready;
      cameraDot.className = 'dot' + (ready ? '' : ' off');
      cameraStatusText.textContent = msg || (ready ? 'Ready' : 'Off');
      updateButtons();
    }

    function updateButtons() {
      const hasPhotos = state.photos.some(p => p.dataUrl);
      const allFilled = state.photos.every(p => p.dataUrl);
      captureBtn.disabled = !state.cameraReady || allFilled;
      captureBtn.classList.toggle('has-photos', hasPhotos);
      retakeBtn.disabled = !hasPhotos || !state.cameraReady;
      sendBtn.disabled = !hasPhotos || !state.cameraReady;
      
      // Update capture button text
      if (allFilled) {
        captureBtn.style.opacity = '0.5';
      } else {
        captureBtn.style.opacity = '1';
      }
    }

    function renderMainView() {
      const slot = state.selectedIndex;
      const photo = state.photos[slot];
      const ticket = ticketInput.value || '';

      if (photo.dataUrl) {
        mainPreviewImg.src = photo.dataUrl;
        mainPreviewImg.style.display = 'block';
        mainPlaceholder.style.display = 'none';
        cameraPreview.classList.add('has-image');
        
        const displayText = photo.text || ticket;
        if (displayText) {
          mainTextOverlay.textContent = displayText;
          mainTextOverlay.classList.remove('hidden');
        } else {
          mainTextOverlay.classList.add('hidden');
        }
      } else {
        mainPreviewImg.style.display = 'none';
        mainPlaceholder.style.display = 'flex';
        cameraPreview.classList.remove('has-image');
        mainTextOverlay.classList.add('hidden');
      }
      updateThumbnails();
      updateButtons();
    }

    function updateThumbnails() {
      for (let i = 0; i < 2; i++) {
        const thumb = thumbnails[i];
        const photo = state.photos[i];
        const existingImg = thumb.querySelector('img');
        const placeholder = thumb.querySelector('.thumb-placeholder');
        const retakeLabel = thumb.querySelector('.thumb-retake');

        if (photo.dataUrl) {
          if (!existingImg) {
            const img = document.createElement('img');
            img.src = photo.dataUrl;
            img.alt = `Photo ${i+1}`;
            thumb.insertBefore(img, placeholder);
            thumb.classList.add('has-image');
          } else {
            existingImg.src = photo.dataUrl;
          }
          if (placeholder) placeholder.style.display = 'none';
          if (retakeLabel) retakeLabel.style.display = 'block';
        } else {
          if (existingImg) existingImg.remove();
          if (placeholder) placeholder.style.display = 'block';
          if (retakeLabel) retakeLabel.style.display = 'none';
          thumb.classList.remove('has-image');
        }
        thumb.classList.toggle('active', i === state.selectedIndex);
      }
    }

    function syncTextToPhotos() {
      const ticket = ticketInput.value || '';
      for (let i = 0; i < 2; i++) {
        if (!state.photos[i].dataUrl) {
          state.photos[i].text = ticket;
        } else if (!state.photos[i].text || state.photos[i].text === '') {
          state.photos[i].text = ticket;
        }
      }
    }

    // --- PERMISSION ---
    async function requestCameraPermission() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus('❌ Camera not supported', 'error');
        permBtn.className = 'permission-btn denied';
        permMain.textContent = '❌ Not Supported';
        permDot.className = 'dot red';
        permLabel.textContent = 'Camera not available';
        return false;
      }

      permBtn.className = 'permission-btn checking';
      permMain.textContent = '⏳ Requesting...';
      permDot.className = 'dot gray';
      permLabel.textContent = 'Please wait...';
      permBtn.disabled = true;
      setStatus('📷 Requesting camera...', 'warning');

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        stream.getTracks().forEach(t => t.stop());
        state.cameraReady = true;
        permBtn.className = 'permission-btn granted';
        permMain.textContent = '✅ Camera Ready';
        permDot.className = 'dot green';
        permLabel.textContent = 'Camera access granted';
        setCameraStatus(true, 'Ready');
        setStatus('📸 Camera ready! Tap capture.', 'success');
        permBtn.disabled = true;
        return true;
      } catch (error) {
        if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
          permBtn.className = 'permission-btn denied';
          permMain.textContent = '⚠️ Tap to Allow';
          permDot.className = 'dot red';
          permLabel.textContent = 'Permission denied - tap to retry';
          setStatus('⚠️ Camera denied. Tap the button above.', 'error');
          permBtn.disabled = false;
        } else {
          permBtn.className = 'permission-btn denied';
          permMain.textContent = '❌ Error';
          permDot.className = 'dot red';
          permLabel.textContent = error.message || 'Camera error';
          setStatus('❌ Camera error', 'error');
          permBtn.disabled = false;
        }
        return false;
      }
    }

    permBtn.addEventListener('click', async () => {
      if (permBtn.disabled) return;
      await requestCameraPermission();
    });

    // --- CAPTURE PHOTO ---
    async function capturePhoto() {
      if (!state.cameraReady) {
        await requestCameraPermission();
        if (!state.cameraReady) return;
      }

      // Find first empty slot
      let slot = -1;
      for (let i = 0; i < 2; i++) {
        if (!state.photos[i].dataUrl) {
          slot = i;
          break;
        }
      }
      if (slot === -1) {
        setStatus('⚠️ Both slots filled! Retake or clear.', 'warning');
        return;
      }

      setStatus('📷 Capturing...', 'warning');

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });

        const video = document.createElement('video');
        video.srcObject = stream;
        video.setAttribute('playsinline', 'true');
        video.style.width = '100%';
        video.style.height = 'auto';
        video.style.maxHeight = '300px';
        video.style.borderRadius = '20px';
        video.style.background = '#080e1a';

        // Show preview in main area
        const origPlaceholder = mainPlaceholder;
        const origImg = mainPreviewImg;
        origImg.style.display = 'none';
        origPlaceholder.style.display = 'none';

        const vidContainer = document.createElement('div');
        vidContainer.id = 'temp-video';
        vidContainer.style.width = '100%';
        vidContainer.appendChild(video);
        cameraPreview.appendChild(vidContainer);

        video.play().then(() => {
          setTimeout(() => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 1280;
            canvas.height = video.videoHeight || 720;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const ticket = ticketInput.value || '';
            let combined = ticket;

            // Draw text
            if (combined) {
              ctx.font = 'bold 50px -apple-system, "SF Pro Display", system-ui, sans-serif';
              ctx.shadowColor = 'rgba(0,0,0,0.9)';
              ctx.shadowBlur = 20;
              ctx.fillStyle = '#ffffff';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'bottom';
              const metrics = ctx.measureText(combined);
              const tw = metrics.width + 80;
              const th = 90;
              const tx = (canvas.width - tw) / 2;
              const ty = canvas.height - 70 - th;
              ctx.shadowBlur = 0;
              ctx.fillStyle = 'rgba(0,0,0,0.65)';
              if (ctx.roundRect) {
                ctx.beginPath();
                ctx.roundRect(tx, ty, tw, th, 24);
                ctx.fill();
              } else {
                ctx.rect(tx, ty, tw, th);
                ctx.fill();
              }
              ctx.shadowBlur = 20;
              ctx.fillStyle = '#ffffff';
              ctx.fillText(combined, canvas.width/2, canvas.height - 55);
            }

            const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
            state.photos[slot].dataUrl = dataUrl;
            state.photos[slot].text = combined || ticket;
            state.selectedIndex = slot;

            vidContainer.remove();
            renderMainView();
            setStatus(`✅ Photo ${slot+1} captured!`, 'success');
            stream.getTracks().forEach(t => t.stop());
          }, 600);
        }).catch(err => {
          setStatus('❌ Video error: ' + err.message, 'error');
          stream.getTracks().forEach(t => t.stop());
        });
      } catch (error) {
        if (error.name === 'NotAllowedError') {
          setStatus('❌ Camera denied. Tap the blue button.', 'error');
        } else {
          setStatus('❌ Error: ' + error.message, 'error');
        }
      }
    }

    // --- RETAKE ---
    function retakePhoto() {
      const slot = state.selectedIndex;
      if (!state.photos[slot].dataUrl) {
        // Find first filled slot
        for (let i = 0; i < 2; i++) {
          if (state.photos[i].dataUrl) {
            state.selectedIndex = i;
            break;
          }
        }
      }
      const idx = state.selectedIndex;
      if (!state.photos[idx].dataUrl) {
        setStatus('⚠️ No photo to retake', 'warning');
        return;
      }
      state.photos[idx].dataUrl = null;
      state.photos[idx].text = ticketInput.value || '';
      renderMainView();
      setStatus(`🔄 Photo ${idx+1} removed for retake`, 'info');
    }

    // --- SEND WHATSAPP ---
    function sendWhatsApp() {
      syncTextToPhotos();
      const photosWithData = state.photos.filter(p => p.dataUrl);
      if (photosWithData.length === 0) {
        setStatus('⚠️ No photos to send', 'error');
        return;
      }

      let message = '🏨 *Bed Decor Photos*%0a';
      state.photos.forEach((p, idx) => {
        if (p.dataUrl) {
          const label = p.text || `Photo ${idx+1}`;
          message += `📸 ${idx+1}: ${label}%0a`;
        }
      });
      if (ticketInput.value) {
        message += `%0a🎫 Ticket: ${ticketInput.value}`;
      }
      message += `%0a✨ Honeymoon bed decoration`;

      const firstPhoto = photosWithData[0];
      const encodedMsg = encodeURIComponent(message);

      if (navigator.share && firstPhoto.dataUrl) {
        fetch(firstPhoto.dataUrl)
          .then(res => res.blob())
          .then(blob => {
            const file = new File([blob], `bed_photo_1.jpg`, { type: 'image/jpeg' });
            const shareData = {
              title: 'Bed Decor Photos',
              text: `Bed decoration: ${state.photos.map(p => p.text || '').filter(Boolean).join(', ')}`,
              files: [file]
            };
            if (navigator.canShare && navigator.canShare(shareData)) {
              navigator.share(shareData)
                .then(() => setStatus('✅ Shared!', 'success'))
                .catch(err => {
                  if (err.name !== 'AbortError') setStatus('⚠️ Share cancelled', 'warning');
                });
            } else {
              window.open(`https://api.whatsapp.com/send?text=${encodedMsg}`, '_blank');
              setStatus('📤 WhatsApp opened', 'info');
            }
          })
          .catch(() => {
            window.open(`https://api.whatsapp.com/send?text=${encodedMsg}`, '_blank');
            setStatus('📤 WhatsApp opened', 'info');
          });
      } else {
        window.open(`https://api.whatsapp.com/send?text=${encodedMsg}`, '_blank');
        setStatus('📤 WhatsApp opened', 'info');
      }
    }

    // --- THUMBNAIL CLICK ---
    thumbnails.forEach((thumb, idx) => {
      thumb.addEventListener('click', () => {
        if (state.photos[idx].dataUrl) {
          // Show fullscreen
          modalImg.src = state.photos[idx].dataUrl;
          modalText.textContent = state.photos[idx].text || ticketInput.value || `Photo ${idx+1}`;
          modal.classList.add('active');
        } else {
          // Select this slot for capture
          state.selectedIndex = idx;
          renderMainView();
          setStatus(`📸 Slot ${idx+1} selected`, 'info');
        }
      });
      
      // Retake on thumbnail
      thumb.querySelector('.thumb-retake')?.addEventListener('click', (e) => {
        e.stopPropagation();
        if (state.photos[idx].dataUrl) {
          state.photos[idx].dataUrl = null;
          state.photos[idx].text = ticketInput.value || '';
          if (state.selectedIndex === idx) {
            renderMainView();
          } else {
            updateThumbnails();
          }
          setStatus(`🔄 Photo ${idx+1} removed`, 'info');
        }
      });
    });

    // --- MODAL ---
    modalClose.addEventListener('click', () => modal.classList.remove('active'));
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.classList.remove('active');
    });

    // --- EVENT LISTENERS ---
    captureBtn.addEventListener('click', capturePhoto);
    retakeBtn.addEventListener('click', retakePhoto);
    sendBtn.addEventListener('click', sendWhatsApp);

    ticketInput.addEventListener('input', () => {
      const ticket = ticketInput.value || '';
      // Update all empty slots with ticket text
      for (let i = 0; i < 2; i++) {
        if (!state.photos[i].dataUrl) {
          state.photos[i].text = ticket;
        }
      }
      // Update main overlay if showing
      if (state.photos[state.selectedIndex]?.dataUrl) {
        const current = state.photos[state.selectedIndex];
        const displayText = current.text || ticket;
        if (displayText) {
          mainTextOverlay.textContent = displayText;
          mainTextOverlay.classList.remove('hidden');
        }
      }
      setStatus('🎫 Ticket updated', 'info');
    });

    // Polyfill roundRect
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
        if (r > w/2) r = w/2;
        if (r > h/2) r = h/2;
        this.moveTo(x + r, y);
        this.lineTo(x + w - r, y);
        this.quadraticCurveTo(x + w, y, x + w, y + r);
        this.lineTo(x + w, y + h - r);
        this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        this.lineTo(x + r, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r);
        this.lineTo(x, y + r);
        this.quadraticCurveTo(x, y, x + r, y);
        this.closePath();
        return this;
      };
    }

    // --- INIT ---
    async function init() {
      renderMainView();
      setStatus('📸 Tap capture to take photo', 'info');
      // Auto-check permission
      if (navigator.permissions && navigator.permissions.query) {
        try {
          const permStatus = await navigator.permissions.query({ name: 'camera' });
          if (permStatus.state === 'granted') {
            await requestCameraPermission();
          }
        } catch (e) {}
      }
    }

    init();
  })();
</script>
</body>
</html>
